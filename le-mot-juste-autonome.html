/* =====================================================================
   Le Mot Juste â Design system
   EsthĂŠtique ĂŠditoriale : papier chaud, encre, accent bordeaux.
   Mobile-first, thĂ¨me clair + sombre automatique.
   ===================================================================== */

/* ---------- Tokens ---------- */
:root {
  /* Couleurs â clair */
  --paper:        #FAF6EF;
  --paper-2:      #F3ECE0;
  --surface:      #FFFFFF;
  --surface-2:    #FBF8F2;
  --ink:          #211C16;
  --ink-2:        #4A4139;
  --muted:        #857A6D;
  --line:         #E6DCCB;
  --line-strong:  #D8CBB4;

  --accent:       #8E2C3B;   /* bordeaux / encre */
  --accent-soft:  #F3E2E1;
  --accent-ink:   #6E1F2C;
  --gold:         #B4832B;
  --gold-soft:    #F6ECD6;

  --green:        #2F7D51;
  --green-soft:   #E2F0E5;
  --amber:        #B97407;
  --amber-soft:   #FaEBCF;
  --red:          #B23A2E;
  --red-soft:     #F6E0DA;

  /* Typo */
  --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua",
           Georgia, "Noto Serif", "Times New Roman", serif;
  --sans:  -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
           Arial, "Noto Sans", sans-serif;
  --mono:  "SF Mono", ui-monospace, "Menlo", "Roboto Mono", monospace;

  /* Espacement */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;

  --radius:    14px;
  --radius-sm: 10px;
  --radius-lg: 22px;

  --shadow-1: 0 1px 2px rgba(33,28,22,.06), 0 2px 8px rgba(33,28,22,.05);
  --shadow-2: 0 6px 24px rgba(33,28,22,.12);

  --tabbar-h: 66px;
  --maxw: 720px;

  color-scheme: light dark;
}

@media (prefers-color-scheme: dark) {
  :root {
    --paper:        #17140F;
    --paper-2:      #1F1B15;
    --surface:      #221E17;
    --surface-2:    #2A251D;
    --ink:          #F1E9DB;
    --ink-2:        #CFC4B2;
    --muted:        #9A8E7C;
    --line:         #352E24;
    --line-strong:  #463D2F;

    --accent:       #E08792;
    --accent-soft:  #3A2226;
    --accent-ink:   #F0AEB6;
    --gold:         #D7AE5E;
    --gold-soft:    #332B18;

    --green:        #6FC28C;
    --green-soft:   #1E2E23;
    --amber:        #E0A94A;
    --amber-soft:   #322913;
    --red:          #E28576;
    --red-soft:     #33211C;

    --shadow-1: 0 1px 2px rgba(0,0,0,.4);
    --shadow-2: 0 8px 28px rgba(0,0,0,.5);
  }
}

/* ---------- Reset & base ---------- */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.5;
  font-size: 17px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overscroll-behavior-y: none;
}
h1, h2, h3, h4 { font-family: var(--serif); font-weight: 600; line-height: 1.2; margin: 0; }
p { margin: 0 0 var(--sp-3); }
a { color: var(--accent); }
button { font-family: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
::selection { background: var(--accent-soft); }

/* ---------- Layout applicatif ---------- */
#app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter: saturate(140%) blur(10px);
  -webkit-backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1px solid var(--line);
  padding: calc(env(safe-area-inset-top) + var(--sp-3)) var(--sp-4) var(--sp-3);
}
.app-header .eyebrow {
  font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--accent); font-weight: 700; margin-bottom: 2px;
}
.app-header h1 { font-size: 24px; letter-spacing: -.01em; }
.app-header .sub { color: var(--muted); font-size: 13.5px; margin-top: 2px; }

.view {
  flex: 1;
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
  padding: var(--sp-4) var(--sp-4) calc(var(--tabbar-h) + var(--sp-6) + env(safe-area-inset-bottom));
  animation: fade .28s ease both;
}
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ---------- Barre d'onglets ---------- */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  display: flex;
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter: saturate(150%) blur(14px);
  -webkit-backdrop-filter: saturate(150%) blur(14px);
  border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom);
}
.tabbar button {
  flex: 1;
  border: 0; background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 4px 8px;
  color: var(--muted);
  font-size: 11px; font-weight: 600; letter-spacing: .01em;
  transition: color .18s;
}
.tabbar button svg { width: 24px; height: 24px; stroke-width: 1.7; }
.tabbar button.active { color: var(--accent); }
.tabbar button.active svg { transform: translateY(-1px); }

/* ---------- Composants ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-1);
  padding: var(--sp-4);
}
.stack > * + * { margin-top: var(--sp-3); }
.muted { color: var(--muted); }
.center { text-align: center; }

/* Puce / catĂŠgorie */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 999px;
  background: var(--paper-2); color: var(--ink-2);
  font-size: 12.5px; font-weight: 600;
  border: 1px solid var(--line);
}
.chip.accent { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }
.chip.gold   { background: var(--gold-soft); color: var(--gold); border-color: transparent; }

/* Boutons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 18px; border-radius: 999px;
  font-size: 15px; font-weight: 650; cursor: pointer;
  border: 1px solid var(--line-strong); background: var(--surface); color: var(--ink);
  transition: transform .08s, background .18s, border-color .18s;
  min-height: 46px;
}
.btn:active { transform: scale(.97); }
.btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
.btn.primary:disabled { opacity: .5; cursor: default; }
.btn.ghost { background: transparent; border-color: transparent; color: var(--accent); }
.btn.block { width: 100%; }
.btn svg { width: 19px; height: 19px; }

/* Champ de recherche */
.search {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 999px; padding: 0 16px; height: 48px;
  box-shadow: var(--shadow-1);
}
.search svg { width: 20px; height: 20px; color: var(--muted); flex: none; }
.search input {
  flex: 1; border: 0; background: none; outline: none;
  font-size: 16px; color: var(--ink); font-family: inherit;
}

/* Grille de catĂŠgories */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }
.cat-tile {
  text-align: left; cursor: pointer;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: var(--sp-4);
  box-shadow: var(--shadow-1);
  transition: transform .1s, box-shadow .2s;
  display: flex; flex-direction: column; gap: 6px; min-height: 108px;
}
.cat-tile:active { transform: scale(.98); }
.cat-tile .ic {
  width: 38px; height: 38px; border-radius: 11px;
  display: grid; place-items: center; margin-bottom: 4px;
  background: var(--accent-soft); color: var(--accent-ink);
}
.cat-tile .ic svg { width: 21px; height: 21px; }
.cat-tile h3 { font-size: 16.5px; }
.cat-tile .count { font-size: 12.5px; color: var(--muted); font-weight: 600; }

/* AccordĂŠon de rĂ¨gle */
.rule {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-1);
}
.rule + .rule { margin-top: var(--sp-3); }
.rule > summary {
  list-style: none; cursor: pointer; padding: var(--sp-4);
  display: flex; align-items: flex-start; gap: 12px;
  font-family: var(--serif); font-size: 17px; font-weight: 600;
}
.rule > summary::-webkit-details-marker { display: none; }
.rule > summary .marker {
  flex: none; margin-top: 3px; color: var(--accent);
  transition: transform .2s;
}
.rule[open] > summary .marker { transform: rotate(90deg); }
.rule .body { padding: 0 var(--sp-4) var(--sp-4); }
.rule .body p:last-child { margin-bottom: 0; }

/* Exemples correct / incorrect */
.ex { display: flex; gap: 10px; align-items: baseline; padding: 7px 0; }
.ex + .ex { border-top: 1px dashed var(--line); }
.ex .mark { flex: none; font-weight: 700; width: 20px; }
.ex.ok  .mark { color: var(--green); }
.ex.no  .mark { color: var(--red); }
.ex.no  .txt  { text-decoration: line-through; text-decoration-color: var(--red); color: var(--ink-2); }
.ex .txt em { font-style: normal; background: var(--gold-soft); padding: 0 3px; border-radius: 4px; }

.note {
  background: var(--surface-2); border-left: 3px solid var(--gold);
  padding: 10px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 15px; color: var(--ink-2);
}
.note.astuce { border-color: var(--accent); }

/* Section titre */
.section-head { display: flex; align-items: center; justify-content: space-between; margin: var(--sp-5) 0 var(--sp-3); }
.section-head h2 { font-size: 20px; }
.back {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  background: none; border: 0; color: var(--accent); font-weight: 650; font-size: 15px;
  padding: 8px 0;
}
.back svg { width: 18px; height: 18px; }

/* Comparaison de mots (nuances) */
.nuance-pair { display: grid; gap: var(--sp-3); }
.nuance-word { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: var(--sp-3) var(--sp-4); background: var(--surface-2); }
.nuance-word .w { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--accent-ink); }
.nuance-word .d { font-size: 15px; color: var(--ink-2); margin-top: 2px; }
.nuance-word .e { font-size: 14.5px; color: var(--muted); font-style: italic; margin-top: 6px; }

/* ---------- Mot du jour ---------- */
.mdj-card {
  background: linear-gradient(160deg, var(--surface), var(--surface-2));
  border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-2); padding: var(--sp-6) var(--sp-5) var(--sp-5);
  position: relative; overflow: hidden;
}
.mdj-card::before {
  content: "ÂŤÂť"; position: absolute; top: -18px; right: 8px;
  font-family: var(--serif); font-size: 120px; color: var(--accent);
  opacity: .06; pointer-events: none;
}
.mdj-date { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
.mdj-word { font-family: var(--serif); font-size: 40px; font-weight: 600; letter-spacing: -.01em; margin: 6px 0 2px; color: var(--accent-ink); line-height: 1.05; }
.mdj-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 4px 0 var(--sp-3); }
.mdj-pron { color: var(--muted); font-style: italic; }
.mdj-def { font-size: 18px; line-height: 1.5; }
.mdj-block { margin-top: var(--sp-4); }
.mdj-block .lbl { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
.mdj-ex { font-family: var(--serif); font-size: 16.5px; font-style: italic; color: var(--ink-2); padding-left: 14px; border-left: 2px solid var(--line-strong); }
.mdj-ex + .mdj-ex { margin-top: 10px; }
.syn-list { display: flex; flex-wrap: wrap; gap: 7px; }
.mdj-actions { display: flex; gap: 10px; margin-top: var(--sp-5); }

.hist-item {
  display: flex; align-items: center; gap: 12px; padding: var(--sp-3) 0;
  cursor: pointer; border-bottom: 1px solid var(--line);
}
.hist-item .w { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.hist-item .dt { margin-left: auto; font-size: 12.5px; color: var(--muted); }

/* ---------- DictĂŠe ---------- */
.level-list { display: grid; gap: var(--sp-3); }
.level-card {
  cursor: pointer; text-align: left; width: 100%;
  border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--surface); padding: var(--sp-4); box-shadow: var(--shadow-1);
  display: flex; align-items: center; gap: var(--sp-4);
  transition: transform .1s;
}
.level-card:active { transform: scale(.98); }
.level-dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
.level-facile       .level-dot { background: var(--green); }
.level-intermediaire .level-dot { background: var(--amber); }
.level-expert       .level-dot { background: var(--red); }
.level-card h3 { font-size: 17px; }
.level-card .meta { font-size: 13px; color: var(--muted); }
.level-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; padding: 4px 9px; border-radius: 999px; }
.level-facile .level-badge        { background: var(--green-soft); color: var(--green); }
.level-intermediaire .level-badge { background: var(--amber-soft); color: var(--amber); }
.level-expert .level-badge        { background: var(--red-soft); color: var(--red); }

.player {
  display: flex; align-items: center; justify-content: center; gap: var(--sp-4);
  padding: var(--sp-4); background: var(--surface-2);
  border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: var(--sp-4);
}
.play-btn {
  width: 64px; height: 64px; border-radius: 50%; border: 0; cursor: pointer;
  background: var(--accent); color: #fff; display: grid; place-items: center;
  box-shadow: var(--shadow-2); transition: transform .1s;
}
.play-btn:active { transform: scale(.94); }
.play-btn svg { width: 28px; height: 28px; }
.speed-ctl { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); }
.speed-ctl input { width: 110px; }

.dictee-input {
  width: 100%; min-height: 180px; resize: vertical;
  font-family: var(--serif); font-size: 17px; line-height: 1.7;
  padding: var(--sp-4); border: 1px solid var(--line-strong);
  border-radius: var(--radius); background: var(--surface); color: var(--ink);
  outline: none;
}
.dictee-input:focus { border-color: var(--accent); }

/* RĂŠsultat de dictĂŠe */
.score-ring { display: flex; align-items: center; gap: var(--sp-4); }
.score-num { font-family: var(--serif); font-size: 46px; font-weight: 600; }
.score-num small { font-size: 20px; color: var(--muted); }
.diff { font-family: var(--serif); font-size: 17px; line-height: 1.9; word-spacing: .04em; }
.diff .ok  { }
.diff .bad { background: var(--red-soft); color: var(--red); border-radius: 4px; padding: 0 3px; text-decoration: line-through; text-decoration-color: var(--red); }
.diff .miss{ background: var(--green-soft); color: var(--green); border-radius: 4px; padding: 0 3px; }
.diff .ins { background: var(--amber-soft); color: var(--amber); border-radius: 4px; padding: 0 3px; }
.legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 13px; color: var(--muted); margin-top: var(--sp-3); }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

/* Divers */
.empty { text-align: center; color: var(--muted); padding: var(--sp-7) var(--sp-4); }
.empty svg { width: 46px; height: 46px; opacity: .4; margin-bottom: var(--sp-3); }
.spacer { height: var(--sp-4); }
.hidden { display: none !important; }

@media (min-width: 560px) {
  .cat-grid { grid-template-columns: 1fr 1fr 1fr; }
}

/* ---------- Carte de rĂ¨gle (liste) ---------- */
.rule-card {
  display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; cursor: pointer;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow-1); padding: 16px 18px;
  transition: transform .1s, box-shadow .2s, border-color .2s;
}
.rule-card:active { transform: scale(.99); }
.rule-card:hover { border-color: var(--line-strong); }
.rule-card + .rule-card { margin-top: 10px; }
.rule-card .rc-body { flex: 1; min-width: 0; }
.rule-card .rc-title { font-family: var(--serif); font-weight: 500; font-size: 18px; letter-spacing: -.005em; color: var(--ink); }
.rule-card .rc-sub { font-size: 13.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.rule-card .rc-arrow { color: var(--line-strong); flex: none; display: grid; place-items: center; }
.rule-card:hover .rc-arrow { color: var(--accent); }

/* ---------- Page ÂŤ cours Âť ---------- */
.cours-title { font-family: var(--serif); font-size: 27px; font-weight: 600; color: var(--accent-ink); line-height: 1.15; margin: 4px 0 6px; }
.cours-lead { font-size: 16px; color: var(--muted); margin-bottom: 18px; }
.cours-body { font-size: 16.5px; line-height: 1.62; }
.cours-body p { margin: 0 0 12px; }
.cours-section-lbl { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin: 22px 0 8px; }

/* ---------- Quiz ---------- */
.quiz-progress { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
.quiz-bar { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
.quiz-bar > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width .35s ease; }
.quiz-question { font-family: var(--serif); font-size: 21px; line-height: 1.5; margin-bottom: 20px; }
.quiz-blank { display: inline-block; min-width: 60px; border-bottom: 2.5px dashed var(--accent); vertical-align: baseline; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; cursor: pointer;
  padding: 15px 18px; border: 1.5px solid var(--line-strong); border-radius: var(--radius);
  background: var(--surface); font-family: var(--serif); font-size: 17.5px; color: var(--ink);
  transition: background .15s, border-color .15s, transform .08s, opacity .2s;
}
.quiz-opt:active { transform: scale(.99); }
.quiz-opt .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line-strong); flex: none; display: grid; place-items: center; }
.quiz-opt .dot svg { width: 14px; height: 14px; }
.quiz-opt.correct { border-color: var(--green); background: var(--green-soft); }
.quiz-opt.correct .dot { border-color: var(--green); background: var(--green); color: #fff; }
.quiz-opt.wrong { border-color: var(--red); background: var(--red-soft); }
.quiz-opt.wrong .dot { border-color: var(--red); background: var(--red); color: #fff; }
.quiz-opt.locked { cursor: default; }
.quiz-opt.dim { opacity: .5; }
.quiz-explain { margin-top: 18px; }
.quiz-result { text-align: center; padding: 24px 0 8px; }
.quiz-medal { font-size: 54px; line-height: 1; margin-bottom: 10px; }
.quiz-score { font-family: var(--serif); font-size: 56px; font-weight: 600; color: var(--accent-ink); line-height: 1; }

(function () {

    /**

    el(tag, props, children) {

            for (const [dk, dv] of Object.entries(v)) node.dataset[dk] = dv;

    "acc-adj-adverbe":

      "<p>Pas de <em>-s</em> Ă  la 2e personne pour les verbes du 1er groupe et pour <em>aller, ouvrir, offrir, cueillir, savoir</em> (mange, va, ouvre, sache).</p><p>On ajoute un <em>-s</em> de liaison devant <em>en</em> et <em>y</em> : ÂŤ penses-y Âť, ÂŤ manges-en Âť, ÂŤ vas-y Âť.</p><p>Les 2e / 3e groupes gardent le <em>-s</em> : finis, prends, viens, fais.</p>",
    "conj-present-er":
      "<p>Terminaisons : <strong>-e, -es, -e, -ons, -ez, -ent</strong> (le <em>-ent</em> ne se prononce pas).</p><p>Variations orthographiques rĂŠguliĂ¨res : <em>-cer</em> â plaĂ§ons ; <em>-ger</em> â mangeons ; <em>-yer</em> â j'emploie ; <em>-eler / -eter</em> â j'appelle / j'achĂ¨te. Le conjugueur de l'application les applique automatiquement.</p>",
    "conj-imparfait-passe-simple":
      "<p>L'<strong>imparfait</strong> dĂŠcrit, installe le dĂŠcor, exprime l'habitude ou la durĂŠe ; le <strong>passĂŠ simple</strong> exprime une action brĂ¨ve, soudaine, qui fait avancer le rĂŠcit.</p><p>Ils coexistent souvent : ÂŤ Il <em>dormait</em> (dĂŠcor) quand le tĂŠlĂŠphone <em>sonna</em> (ĂŠvĂŠnement). Âť</p><p>Ă l'oral et dans un texte courant, le passĂŠ simple cĂ¨de la place au passĂŠ composĂŠ.</p>",
    "conj-subjonctif":
      "<p>Le subjonctif prĂŠsente l'action comme <strong>envisagĂŠe</strong> (souhaitĂŠe, redoutĂŠe, incertaine), non comme un fait rĂŠel.</p><p>DĂŠclencheurs frĂŠquents : <em>vouloir / falloir / craindre que</em> ; les conjonctions <em>bien que, pour que, avant que, jusqu'Ă  ce que, Ă  moins que, quoique, afin que</em> ; une principale nĂŠgative ou interrogative (ÂŤ je ne crois pas qu'il <em>vienne</em> Âť).</p>",
    "conj-t-euphonique":
      "<p>On intercale <em>-t-</em> devant <em>il, elle, on</em> uniquement quand le verbe se termine par <strong>-e</strong> ou <strong>-a</strong> : aime-t-il, viendra-t-elle, y a-t-il. Pas de <em>-t-</em> si le verbe finit dĂŠjĂ  par <em>t</em> ou <em>d</em> (dit-il, prend-elle, vend-on).</p><p>Ă distinguer du <em>t'</em> ĂŠlidĂŠ de ÂŤ te Âť : ÂŤ Je t'aime Âť n'a rien Ă  voir avec ÂŤ aime-t-il Âť.</p>",
    "conj-trois-groupes":
      "<ul><li><strong>1er groupe</strong> : ~90 % des verbes, en <em>-er</em> (rĂŠguliers), sauf ÂŤ aller Âť.</li><li><strong>2e groupe</strong> : en <em>-ir</em>, participe prĂŠsent en <em>-issant</em> (finir, choisirâŚ), environ 300 verbes.</li><li><strong>3e groupe</strong> : verbes irrĂŠguliers â ÂŤ aller Âť, les autres <em>-ir</em> (partir, venir), les <em>-oir</em> (voir, devoir) et les <em>-re</em> (prendre, faire). C'est un groupe fermĂŠ : on n'en crĂŠe plus.</li></ul>",
    "conj-imparfait-terminaisons":
      "<p>Pour <strong>tous</strong> les verbes : <em>-ais, -ais, -ait, -ions, -iez, -aient</em>, ajoutĂŠes au radical du ÂŤ nous Âť prĂŠsent (nous finiss-ons â je finiss-ais).</p><p>Attention aux verbes en <em>-ier, -yer, -ller, -gner</em> : le <em>i</em> de la terminaison s'ajoute au radical â ÂŤ nous criions Âť, ÂŤ vous travailliez Âť, ÂŤ que nous voyions Âť.</p><p>Seul ÂŤ ĂŞtre Âť a un radical Ă  part : ĂŠt- (j'ĂŠtais).</p>",
    "conj-passe-compose":
      "<p>Formation : <strong>auxiliaire au prĂŠsent + participe passĂŠ</strong>.</p><ul><li><strong>Ătre</strong> : verbes de mouvement / changement d'ĂŠtat (aller, venir, partir, arriver, rester, naĂŽtre, mourir, devenirâŚ) et tous les pronominaux ; le participe s'accorde avec le sujet.</li><li><strong>Avoir</strong> : la grande majoritĂŠ des autres ; le participe s'accorde avec le COD placĂŠ avant.</li></ul><p>Auxiliaire Ă  l'imparfait â plus-que-parfait (j'avais mangĂŠ).</p>",
    "conj-futur-terminaisons":
      "<p>Pour tous les verbes : <em>-rai, -ras, -ra, -rons, -rez, -ront</em>. Pour les 1er et 2e groupes, on part de l'infinitif (chanter â je chanterai ; finir â je finirai).</p><p>Beaucoup de verbes du 3e groupe ont un radical de futur particulier : aller â j'<em>irai</em>, voir â je <em>verrai</em>, venir â je <em>viendrai</em>, pouvoir â je <em>pourrai</em>, faire â je <em>ferai</em>.</p>",

    /* ---------- GRAMMAIRE ---------- */
    "gr-nature-fonction":
      "<p>Les <strong>natures</strong> (classes) : nom, dĂŠterminant, adjectif, pronom, verbe, adverbe, prĂŠposition, conjonction, interjection.</p><p>Les <strong>fonctions</strong> se dĂŠfinissent par rapport au verbe (sujet, COD, COI, CC, attribut) ou au nom (ĂŠpithĂ¨te, complĂŠment du nom, apposition). Un mot garde sa nature mais peut changer de fonction selon la phrase.</p>",
    "gr-sujet":
      "<p>Le sujet peut ĂŞtre un nom, un pronom, un groupe nominal, un infinitif (ÂŤ <em>Mentir</em> est vilain Âť) ou une proposition. Il peut ĂŞtre <strong>inversĂŠ</strong> (ÂŤ Que dit-<em>il</em> ? Âť) ou sĂŠparĂŠ du verbe. Plusieurs sujets entraĂŽnent l'accord au pluriel.</p>",
    "gr-cod-coi":
      "<p>Le COD se remplace par <em>le, la, les</em> ; le COI par <em>lui, leur, en, y</em>. On les distingue Ă  la prĂŠposition : COD (aucune), COI (Ă , de).</p><p>Le <strong>COS</strong> (complĂŠment d'objet second) est un deuxiĂ¨me complĂŠment, souvent le destinataire : ÂŤ donner qqch <u>Ă  qqn</u> Âť.</p>",
    "gr-cc":
      "<p>Les complĂŠments circonstanciels prĂŠcisent : temps, lieu, maniĂ¨re, moyen, cause, but, consĂŠquence, condition, comparaisonâŚ Ils sont en gĂŠnĂŠral <strong>dĂŠplaĂ§ables</strong> et <strong>supprimables</strong>, ce qui les distingue du COD.</p>",
    "gr-epithete-attribut":
      "<p>L'ĂŠpithĂ¨te peut ĂŞtre <strong>liĂŠe</strong> (contre le nom) ou <strong>dĂŠtachĂŠe</strong> (par une virgule). L'attribut du sujet passe par un <strong>verbe d'ĂŠtat</strong> (ĂŞtre, paraĂŽtre, sembler, devenir, rester, avoir l'airâŚ). Il existe aussi l'attribut du COD : ÂŤ Je le trouve <em>intelligent</em>. Âť</p>",
    "gr-propositions":
      "<p>Il y a autant de propositions que de verbes conjuguĂŠs. Une <strong>indĂŠpendante</strong> se suffit ; une <strong>principale</strong> commande une <strong>subordonnĂŠe</strong>. Les subordonnĂŠes se rattachent par un pronom relatif (relative), par une conjonction (conjonctive) ou sont interrogatives indirectes.</p>",
    "gr-relative":
      "<p>La relative complĂ¨te un nom, son <strong>antĂŠcĂŠdent</strong>. Le pronom relatif varie selon sa fonction : <em>qui</em> (sujet), <em>que</em> (COD), <em>dont</em> (complĂŠment avec ÂŤ de Âť), <em>oĂš</em> (lieu / temps), <em>lequel, auquel, duquel</em> (aprĂ¨s prĂŠposition).</p>",
    "gr-voix-passive":
      "<p>Seuls les verbes transitifs directs (Ă  COD) se mettent au passif. Le COD devient sujet, le sujet devient <strong>complĂŠment d'agent</strong> (par / de). Le passif se forme avec <strong>ĂŞtre + participe passĂŠ</strong>, Ă  tous les temps (il est / ĂŠtait / sera aimĂŠ).</p>",
    "gr-determinants":
      "<p>Familles : articles (dĂŠfini le/la/les, indĂŠfini un/une/des, partitif du/de la), possessifs (mon, ta, leurâŚ), dĂŠmonstratifs (ce, cet, cette, ces), indĂŠfinis (chaque, plusieurs, aucunâŚ), numĂŠraux (deux, troisâŚ), interrogatifs / exclamatifs (quelâŚ). Le dĂŠterminant s'accorde avec le nom.</p>",
    "gr-types-phrases":
      "<p>Quatre <strong>types</strong> (un seul par phrase) : dĂŠclaratif, interrogatif, exclamatif, impĂŠratif. S'y ajoutent des <strong>formes</strong> qui se cumulent : affirmative / nĂŠgative, active / passive, neutre / emphatique (mise en relief : ÂŤ C'est lui <em>qui</em>âŚ Âť), personnelle / impersonnelle.</p>",
    "gr-complement-agent":
      "<p>Il n'existe qu'Ă  la voix passive et dĂŠsigne le vĂŠritable auteur de l'action. Introduit le plus souvent par <strong>par</strong>, parfois par <strong>de</strong> (verbes de sentiment ou de description : ÂŤ aimĂŠ <em>de</em> tous Âť, ÂŤ couvert <em>de</em> neige Âť). Il peut ĂŞtre absent (ÂŤ La maison a ĂŠtĂŠ vendue Âť).</p>",
    "gr-apposition":
      "<p>L'apposition dĂŠsigne autrement le nom (ou le pronom) qu'elle accompagne. Le plus souvent <strong>dĂŠtachĂŠe</strong> par des virgules (ÂŤ Paris, <em>capitale de la France</em> Âť), parfois <strong>liĂŠe</strong> (ÂŤ le mois <em>de mai</em> Âť, ÂŤ mon ami <em>Paul</em> Âť). Elle est mobile et supprimable.</p>",
    "gr-conjonctions":
      "<p><strong>Coordination</strong> (mais, ou, et, donc, or, ni, car) : relient des ĂŠlĂŠments de mĂŞme fonction. <strong>Subordination</strong> (que, quand, comme, si, lorsque, puisque, quoique, afin queâŚ) : introduisent une subordonnĂŠe. Beaucoup sont des <strong>locutions</strong> : parce que, bien que, dĂ¨s que.</p>",
    "gr-pronoms-personnels":
      "<p>Ils varient selon la personne et la fonction : sujets (je, tu, ilâŚ), COD (me, te, le, la, lesâŚ), COI (me, te, lui, leurâŚ), rĂŠflĂŠchis (me, te, seâŚ), et les pronoms adverbiaux <em>en</em> (= de cela) et <em>y</em> (= Ă  cela / lĂ ). Les formes toniques (moi, toi, lui, euxâŚ) servent Ă  insister.</p>",
    "gr-adverbe":
      "<p>Invariable. CatĂŠgories : maniĂ¨re (bien, vite, lentement), quantitĂŠ / intensitĂŠ (peu, trĂ¨s, beaucoup, assez), temps (hier, souvent), lieu (ici, ailleurs), affirmation / nĂŠgation / doute (oui, neâŚ pas, peut-ĂŞtre), interrogation (quand, oĂš, comment). Beaucoup d'adverbes de maniĂ¨re se forment sur l'adjectif au fĂŠminin + <em>-ment</em> (douce â doucement).</p>",
    "gr-prepositions":
      "<p>PrĂŠpositions simples : Ă , de, dans, en, par, pour, sans, sous, sur, avec, chez, vers, contre, entre, parmiâŚ Locutions prĂŠpositives : Ă  cĂ´tĂŠ de, prĂ¨s de, grĂ˘ce Ă , afin de, au lieu deâŚ Elles introduisent un complĂŠment (du verbe, du nom ou de l'adjectif) et sont invariables.</p>",
    "gr-complement-du-nom":
      "<p>Il prĂŠcise le sens d'un nom et est le plus souvent introduit par une prĂŠposition (de, Ă , en, pour, sansâŚ). Il peut indiquer la matiĂ¨re (une bague <em>en or</em>), la possession (le livre <em>de Marie</em>), l'usage (une salle <em>de sport</em>) ou le contenu (une tasse <em>de thĂŠ</em>).</p>",
    "gr-degres-adjectif":
      "<p><strong>Comparatif</strong> : supĂŠrioritĂŠ (plusâŚ que), infĂŠrioritĂŠ (moinsâŚ que), ĂŠgalitĂŠ (aussiâŚ que). <strong>Superlatif</strong> : relatif (le / la / les plusâŚ, le moinsâŚ) ou absolu (trĂ¨s, fort, extrĂŞmementâŚ).</p><p>Formes irrĂŠguliĂ¨res : bon â meilleur / le meilleur ; mauvais â pire ; petit â moindre ; bien â mieux.</p>",
  };
})();


/* ===== js/conjugueur.js ===== */
/* =====================================================================
   Le Mot Juste â Moteur de conjugaison
   â˘ 1er groupe (-er) : algorithmique, avec toutes les variantes
     orthographiques (-cer, -ger, -yer, -eler/-eter, ĂŠâĂ¨, e muetâĂ¨).
   â˘ 2e groupe (-ir, type finir) : algorithmique.
   â˘ 3e groupe : dĂŠrivĂŠ des ÂŤ parties principales Âť de data/verbes.js.
   Temps composĂŠs construits automatiquement (auxiliaire conjuguĂŠ + pp).

   API : LMJ.conjugue("manger") â objet structurĂŠ (voir bas de fichier).
   ===================================================================== */
(function () {
  "use strict";
  const G = typeof window !== "undefined" ? window : globalThis;
  const LMJ = (G.LMJ = G.LMJ || {});
  const V = LMJ.data.verbes;

  /* ---------- Terminaisons ---------- */
  const FUT = ["ai", "as", "a", "ons", "ez", "ont"];
  const COND = ["ais", "ais", "ait", "ions", "iez", "aient"];
  const IMPF = ["ais", "ais", "ait", "ions", "iez", "aient"];

  function psEnds(type) {
    return {
      a: ["ai", "as", "a", "Ă˘mes", "Ă˘tes", "Ă¨rent"],
      i: ["is", "is", "it", "ĂŽmes", "ĂŽtes", "irent"],
      u: ["us", "us", "ut", "Ăťmes", "Ăťtes", "urent"],
      in: ["ins", "ins", "int", "ĂŽnmes", "ĂŽntes", "inrent"],
    }[type];
  }
  function subjImpEnds(type) {
    return {
      a: ["asse", "asses", "Ă˘t", "assions", "assiez", "assent"],
      i: ["isse", "isses", "ĂŽt", "issions", "issiez", "issent"],
      u: ["usse", "usses", "Ăťt", "ussions", "ussiez", "ussent"],
      in: ["insse", "insses", "ĂŽnt", "inssions", "inssiez", "inssent"],
    }[type];
  }

  const map6 = (stem, ends) => ends.map((e) => (e == null ? null : stem + e));

  /* =====================================================================
     3e groupe â dĂŠrivation depuis les parties principales
     ===================================================================== */
  function simpleFromParts(parts) {
    const t = {
      infinitif: parts.infinitif,
      participePresent: parts.ppr,
      participePasse: parts.pp,
      present: parts.pres.slice(),
    };

    // Imparfait : fourni, ou dĂŠrivĂŠ du ÂŤ nous Âť prĂŠsent (âŚons â âŚais)
    if (parts.imp) t.imparfait = parts.imp.slice();
    else {
      const stem = parts.pres[3].replace(/ons$/, "");
      t.imparfait = map6(stem, IMPF);
    }

    t.futurSimple = map6(parts.futStem, FUT);
    t.conditionnelPresent = map6(parts.futStem, COND);

    if (parts.ps) {
      const [psStem, psType] = parts.ps;
      t.passeSimple = map6(psStem, psEnds(psType));
      t.subjonctifImparfait = map6(psStem, subjImpEnds(psType));
    } else {
      // Verbe dĂŠfectif (ex. traire) : pas de passĂŠ simple ni de subjonctif imparfait.
      t.passeSimple = [null, null, null, null, null, null];
      t.subjonctifImparfait = [null, null, null, null, null, null];
    }

    if (parts.subjForms) t.subjonctifPresent = parts.subjForms.slice();
    else {
      const [ss, sp] = parts.subj;
      t.subjonctifPresent = [ss + "e", ss + "es", ss + "e", sp + "ions", sp + "iez", ss + "ent"];
    }

    if (parts.imper === false) t.imperatifPresent = null;
    else if (Array.isArray(parts.imper)) t.imperatifPresent = parts.imper.slice();
    else {
      let tu = parts.pres[1];
      if (/es$/.test(tu)) tu = tu.slice(0, -1);
      t.imperatifPresent = [tu, parts.pres[3], parts.pres[4]];
    }
    return t;
  }

  /* Auxiliaires prĂŠ-conjuguĂŠs (pour les temps composĂŠs) */
  const AUX = {
    avoir: simpleFromParts(Object.assign({ infinitif: "avoir" }, V["avoir"])),
    etre: simpleFromParts(Object.assign({ infinitif: "ĂŞtre" }, V["ĂŞtre"])),
  };

  function compound(auxKey, pp) {
    const a = AUX[auxKey];
    const j = (arr) => arr.map((f) => (f == null ? null : f + " " + pp));
    return {
      passeCompose: j(a.present),
      plusQueParfait: j(a.imparfait),
      passeAnterieur: j(a.passeSimple),
      futurAnterieur: j(a.futurSimple),
      conditionnelPasse: j(a.conditionnelPresent),
      subjonctifPasse: j(a.subjonctifPresent),
      subjonctifPlusQueParfait: j(a.subjonctifImparfait),
      imperatifPasse: a.imperatifPresent ? a.imperatifPresent.map((f) => f + " " + pp) : null,
    };
  }

  /* =====================================================================
     1er groupe â algorithmique
     ===================================================================== */
  const DOUBLE = new Set([
    "appeler", "rappeler", "interpeler", "jeter", "rejeter", "projeter", "interjeter",
    "feuilleter", "ĂŠpeler", "renouveler", "atteler", "dĂŠteler", "ĂŠtinceler", "ruisseler",
    "amonceler", "ensorceler", "chanceler", "morceler", "cacheter", "empaqueter",
    "ĂŠtiqueter", "hoqueter", "voleter", "cliqueter", "breveter",
  ]);

  function graveLastE(stem) {
    // remplace le dernier ÂŤ e Âť (avant consonnes finales) par ÂŤ Ă¨ Âť
    return stem.replace(/e([^e]*)$/, "Ă¨$1");
  }

  function group1Simple(inf) {
    const stem = inf.slice(0, -2); // sans ÂŤ er Âť
    const endsCer = /cer$/.test(inf);
    const endsGer = /ger$/.test(inf);

    // Adoucissement câĂ§ / gâge devant a, o, Ă˘
    function soft(s, ending) {
      const c = ending.charAt(0);
      const aoo = c === "a" || c === "o" || c === "Ă˘";
      if (endsCer && aoo) return s.slice(0, -1) + "Ă§" + ending;
      if (endsGer && aoo) return s + "e" + ending;
      return s + ending;
    }

    // Radical modifiĂŠ pour les terminaisons ÂŤ e muet Âť (+ futur selon le cas)
    let modStem = stem;
    let futUsesMod = false;
    if (/yer$/.test(inf)) {
      modStem = stem.slice(0, -1) + "i";
      futUsesMod = true;
    } else if (/(eler|eter)$/.test(inf)) {
      if (DOUBLE.has(inf)) { modStem = stem + stem.slice(-1); }
      else { modStem = graveLastE(stem); }
      futUsesMod = true;
    } else if (/ĂŠ[bcdfghjklmnpqrstvwxzĂ§]+$/.test(stem)) {
      modStem = stem.replace(/ĂŠ([^ĂŠ]*)$/, "Ă¨$1"); // ĂŠâĂ¨, mais futur garde ĂŠ
      futUsesMod = false;
    } else if (/e[bcdfghjklmnpqrstvwxzĂ§]+$/.test(stem)) {
      modStem = graveLastE(stem); // e muet â Ă¨
      futUsesMod = true;
    }

    const silent = (i) => i === 0 || i === 1 || i === 2 || i === 5; // je,tu,il,ils

    const present = ["e", "es", "e", "ons", "ez", "ent"].map((e, i) =>
      soft(silent(i) ? modStem : stem, e)
    );
    const subjPres = ["e", "es", "e", "ions", "iez", "ent"].map((e, i) =>
      soft(silent(i) ? modStem : stem, e)
    );
    const imparfait = IMPF.map((e) => soft(stem, e));
    const futStem = futUsesMod ? modStem + "er" : inf;
    const passeSimple = psEnds("a").map((e) => soft(stem, e));
    const subjImp = subjImpEnds("a").map((e) => soft(stem, e));

    return {
      infinitif: inf,
      participePresent: soft(stem, "ant"),
      participePasse: stem + "ĂŠ",
      present,
      imparfait,
      futurSimple: map6(futStem, FUT),
      conditionnelPresent: map6(futStem, COND),
      passeSimple,
      subjonctifPresent: subjPres,
      subjonctifImparfait: subjImp,
      imperatifPresent: [present[0], present[3], present[4]],
    };
  }

  /* =====================================================================
     2e groupe â algorithmique (type finir)
     ===================================================================== */
  function group2Simple(inf) {
    const stem = inf.slice(0, -2); // sans ÂŤ ir Âť
    return {
      infinitif: inf,
      participePresent: stem + "issant",
      participePasse: stem + "i",
      present: [stem + "is", stem + "is", stem + "it", stem + "issons", stem + "issez", stem + "issent"],
      imparfait: map6(stem + "iss", IMPF),
      futurSimple: map6(inf, FUT),
      conditionnelPresent: map6(inf, COND),
      passeSimple: map6(stem, psEnds("i")),
      subjonctifPresent: map6(stem + "iss", ["e", "es", "e", "ions", "iez", "ent"]),
      subjonctifImparfait: map6(stem, subjImpEnds("i")),
      imperatifPresent: [stem + "is", stem + "issons", stem + "issez"],
    };
  }

  /* =====================================================================
     Assemblage & dĂŠtection du type
     ===================================================================== */
  function determineAux(inf, irr) {
    if (irr && irr.aux) return irr.aux;
    return LMJ.data.verbesEtre && LMJ.data.verbesEtre.has(inf) ? "etre" : "avoir";
  }

  function assemble(inf, groupe, irregulier, aux, simple, pp, impersonnel) {
    const comp = compound(aux, pp);
    const res = {
      disponible: true,
      infinitif: inf,
      groupe,
      irregulier,
      impersonnel: !!impersonnel,
      aux,
      participePresent: simple.participePresent,
      participePasse: pp,
      indicatif: {
        present: simple.present,
        imparfait: simple.imparfait,
        passeSimple: simple.passeSimple,
        futurSimple: simple.futurSimple,
        passeCompose: comp.passeCompose,

    const want = 10, desired = { 1: 4, 2: 3, 3: 3 };
    let pick = [];
    [1, 2, 3].forEach((k) => { pick = pick.concat(tiers[k].slice(0, desired[k])); });
    if (pick.length < want) {
      const rest = [];
      [1, 2, 3].forEach((k) => rest.push(...tiers[k].slice(desired[k])));
      for (const q of rest) { if (pick.length >= want) break; pick.push(q); }
    }
    pick.sort((a, b) => a._n - b._n);
    return pick;
  }

  /* ---------- Carte lĂŠgĂ¨re ---------- */
  function cardNode(item, type) {
    return el("button", { class: "rule-card", on: { click: () => openDetail(item, type) } }, [
      el("div", { class: "rc-body" }, [
        el("div", { class: "rc-title", text: item.titre }),
        el("div", { class: "rc-sub", text: shortText(item, type) }),
      ]),
      el("span", { class: "rc-arrow", html: IC.arrow }),
    ]);
  }

  /* ---------- Contenu dĂŠtaillĂŠ (page cours) selon le type ---------- */
  function exemplesNode(exemples) {
    if (!exemples || !exemples.length) return null;
    const box = el("div", { class: "stack", style: { marginTop: "6px" } });
    exemples.forEach((ex) => {
      if (ex.ok) {
        box.appendChild(el("div", { class: "ex ok" }, [el("span", { class: "mark", text: "â" }), el("span", { class: "txt", html: ex.texte })]));
      } else {
        box.appendChild(el("div", { class: "ex no" }, [el("span", { class: "mark", text: "â" }), el("span", { class: "txt", html: ex.texte })]));
        if (ex.correction) box.appendChild(el("div", { class: "ex ok" }, [el("span", { class: "mark", text: "â" }), el("span", { class: "txt", html: ex.correction })]));
      }
    });
    return box;
  }
  function astuceNode(astuce) {
    if (!astuce) return null;
    return el("div", { class: "note astuce", style: { marginTop: "14px" } }, [el("strong", { text: "Astuce â " }), document.createTextNode(astuce)]);
  }

  function detailBody(item, type) {
    const wrap = el("div");
    if (type === "confusion") {
      item.entrees.forEach((e) => {
        wrap.appendChild(el("div", { class: "nuance-word", style: { marginBottom: "8px" } }, [

          el("div", { class: "d", text: e.sens }),

        ]));
      });
      wrap.appendChild(astuceNode(item.astuce));
    } else if (type === "nuance") {
      if (item.cle) wrap.appendChild(el("div", { class: "note astuce", style: { marginBottom: "14px" } }, [el("strong", { text: "La clĂŠ â " }), document.createTextNode(item.cle)]));
      const grid = el("div", { class: "nuance-pair" });
      item.entrees.forEach((e) => grid.appendChild(el("div", { class: "nuance-word" }, [
        el("div", { class: "w", text: e.mot }), el("div", { class: "d", text: e.sens }), e.exemple ? el("div", { class: "e", text: "ÂŤ " + e.exemple + " Âť" }) : null,
      ])));

      const ex = exemplesNode(item.exemples);

      const as = astuceNode(item.astuce);
      if (as) wrap.appendChild(as);
    }
    return wrap;
  }

  function backBtn() {
    return el("button", { class: "back", on: { click: () => LMJ.nav.back() } }, [el("span", { html: IC.back }), document.createTextNode("Retour")]);
  }

  /* ---------- Page cours ---------- */
  function openDetail(item, type) {
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      root.appendChild(el("div", { class: "cours-lead", style: { marginTop: "10px" }, text: shortText(item, type) }));
      root.appendChild(detailBody(item, type));

      // Section ÂŤ Pour aller plus loin Âť (contenu approfondi, si disponible)
      const approf = LMJ.data.approf && LMJ.data.approf[item.id];
      if (approf) {
        root.appendChild(el("div", { class: "cours-section-lbl", text: "Pour aller plus loin" }));
        root.appendChild(el("div", { class: "cours-body", html: approf }));
      }

      const pool = quizPool(item);
      if (pool.length) {
        const n = pool.length >= 10 ? 10 : pool.length;
        root.appendChild(el("div", { class: "spacer", style: { height: "8px" } }));
        root.appendChild(el("button", {
          class: "btn primary block", style: { marginTop: "14px" },
          html: IC.quiz + `<span>Lancer le quiz Âˇ ${n} questions</span>`,
          on: { click: () => openQuiz(item) },
        }));
        root.appendChild(el("div", { class: "muted", style: { textAlign: "center", fontSize: "12.5px", marginTop: "8px" }, text: "DifficultĂŠ croissante, du facile Ă  l'expert." }));
      }
    }, { eyebrow: "Fiche", title: item.titre });
  }

  /* ---------- Quiz ---------- */
  function openQuiz(item) {
    let questions = buildRamp(item);
    const state = { i: 0, score: 0, answered: false, chosen: -1 };

    LMJ.nav.push((root) => {
      const host = el("div");
      root.appendChild(host);

      function draw() {
        util.clear(host);
        if (state.i >= questions.length) return drawResult();
        const q = questions[state.i];

        // Progression
        host.appendChild(el("div", { class: "quiz-progress" }, [
          el("span", { text: `Question ${state.i + 1} / ${questions.length}` }),
          el("span", { text: `Score : ${state.score}` }),
        ]));
        host.appendChild(el("div", { class: "quiz-bar" }, el("i", { style: { width: Math.round((state.i / questions.length) * 100) + "%" } })));

        // Badge de niveau
        const niv = NIVEAUX[q._n || 1];
        host.appendChild(el("div", { style: { marginBottom: "14px" } }, el("span", { class: "niv-badge " + niv.cls, text: niv.nom })));

        // Question / phrase Ă  trou
        host.appendChild(sentenceNode(q, state.answered ? q.options[q.reponse] : null));

        // Options
        const opts = el("div", { class: "quiz-opts" });
        q.options.forEach((opt, idx) => {
          const dot = el("span", { class: "dot" });
          const b = el("button", { class: "quiz-opt" }, [dot, document.createTextNode(opt)]);
          if (state.answered) {
            b.classList.add("locked");
            if (idx === q.reponse) { b.classList.add("correct"); dot.innerHTML = IC.check; }
            else if (idx === state.chosen) { b.classList.add("wrong"); dot.innerHTML = IC.cross; }
            else b.classList.add("dim");
          } else {
            b.addEventListener("click", () => {
              state.answered = true; state.chosen = idx;
              if (idx === q.reponse) state.score++;
              draw();
            });
          }
          opts.appendChild(b);
        });
        host.appendChild(opts);

        // Explication + suite
        if (state.answered) {
          const ok = state.chosen === q.reponse;
          host.appendChild(el("div", { class: "note astuce quiz-explain" }, [
            el("strong", { text: ok ? "Bravo ! " : "Pas tout Ă  fait. " }),
            document.createTextNode(q.explication || ""),
          ]));
          const last = state.i === questions.length - 1;
          host.appendChild(el("button", {
            class: "btn primary block", style: { marginTop: "18px" },
            text: last ? "Voir le rĂŠsultat" : "Question suivante",
            on: { click: () => { state.i++; state.answered = false; state.chosen = -1; draw(); window.scrollTo({ top: 0 }); } },
          }));
        }
      }

      function drawResult() {
        const total = questions.length;
        const r = state.score / total;
        const medal = r === 1 ? "đ" : r >= 0.7 ? "đ" : r >= 0.5 ? "đ" : "đ";
        const msg = r === 1 ? "Sans faute, parfait !" : r >= 0.7 ? "TrĂ¨s bon score !" : r >= 0.5 ? "Pas mal, continue !" : "Relis la fiche et retente ta chance.";
        util.clear(host);
        host.appendChild(el("div", { class: "quiz-result" }, [
          el("div", { class: "quiz-medal", text: medal }),
          el("div", { class: "quiz-score", html: `${state.score}<small> / ${total}</small>` }),
          el("div", { class: "muted", style: { marginTop: "8px", fontSize: "16px" }, text: msg }),
        ]));
        host.appendChild(el("button", {
          class: "btn primary block", style: { marginTop: "18px" }, text: "Recommencer le quiz",
          on: { click: () => { questions = buildRamp(item); state.i = 0; state.score = 0; state.answered = false; state.chosen = -1; draw(); window.scrollTo({ top: 0 }); } },
        }));
        host.appendChild(el("button", { class: "btn block", style: { marginTop: "10px" }, text: "Retour Ă  la fiche", on: { click: () => LMJ.nav.back() } }));
      }

      draw();
    }, { eyebrow: "Quiz", title: item.titre });
  }

  function sentenceNode(q, revealWord) {
    if (q.q.indexOf("___") === -1) return el("div", { class: "quiz-question", text: q.q });
    const parts = q.q.split("___");
    const frag = el("div", { class: "quiz-question" });
    frag.appendChild(document.createTextNode(parts[0]));
    if (revealWord) {
      frag.appendChild(el("strong", { style: { color: "var(--accent-ink)" }, text: revealWord }));
    } else {
      frag.appendChild(el("span", { class: "quiz-blank", html: "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;" }));
    }
    frag.appendChild(document.createTextNode(parts.slice(1).join("___")));
    return frag;
  }

  /* ---------- Ăcran d'une catĂŠgorie ---------- */
  function openCategory(cat) {
    if (cat.type === "conjugaison") return openConjugaison();
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      root.appendChild(el("div", { class: "spacer" }));
      (cat.data || []).forEach((item) => root.appendChild(cardNode(item, cat.type)));
    }, { eyebrow: "Les rĂ¨gles", title: cat.nom, sub: cat.desc });
  }

  /* =====================================================================
     Conjugueur (inchangĂŠ sur le fond ; les rĂ¨gles de conjugaison passent
     en cartes lĂŠgĂ¨res â page cours â quiz).
     ===================================================================== */
  const PRO_IND = ["je", "tu", "il/elle", "nous", "vous", "ils/elles"];
  const PRO_SUBJ = ["que je", "que tu", "qu'il/elle", "que nous", "que vous", "qu'ils/elles"];
  const IMP_LBL = ["(tu)", "(nous)", "(vous)"];
  function elide(pro, form) {
    const voyelle = /^[aĂ Ă˘eĂŠĂ¨ĂŞiĂŽĂŻoĂ´u ĂšĂťyh]/i.test(form);
    if (voyelle) { if (pro === "je") return "j'" + form; if (pro === "que je") return "que j'" + form; }
    return pro + " " + form;
  }
  function tenseBlock(label, forms, mode) {
    if (!forms || !forms.some((f) => f != null)) return null;
    const box = el("div", { class: "card", style: { padding: "14px 16px" } });
    box.appendChild(el("div", { style: { fontSize: "11px", letterSpacing: ".1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: "700", marginBottom: "8px" }, text: label }));
    const list = el("div", { style: { fontFamily: "var(--serif)", fontSize: "16px", lineHeight: "1.85" } });
    forms.forEach((f, i) => {
      if (f == null) return;
      let txt = mode === "imp" ? f + " " : elide(mode === "subj" ? PRO_SUBJ[i] : PRO_IND[i], f);
      list.appendChild(el("div", null, [
        mode === "imp" ? el("span", { class: "muted", style: { fontSize: "12px", marginRight: "6px" }, text: IMP_LBL[i] }) : null,
        document.createTextNode(txt),
      ]));
    });
    box.appendChild(list);
    return box;
  }
  function renderConjugaison(container, verbe) {
    util.clear(container);
    const c = LMJ.conjugue(verbe);
    if (!c.disponible) {
      container.appendChild(el("div", { class: "empty" }, [
        el("div", { html: IC.search }),
        el("p", { html: `Le verbe <strong>ÂŤ ${util.escape(c.infinitif)} Âť</strong> n'est pas encore dans la base.` }),
        el("p", { class: "muted", text: "Le moteur couvre tous les verbes en -er et -ir rĂŠguliers, plus une cinquantaine d'irrĂŠguliers essentiels." }),
      ]));
      return;
    }
    const grpLabel = c.groupe === 1 ? "1er groupe" : c.groupe === 2 ? "2e groupe" : "3e groupe";
    container.appendChild(el("div", { class: "card", style: { marginBottom: "16px", background: "var(--surface-2)" } }, [
      el("div", { style: { display: "flex", alignItems: "baseline", gap: "10px", flexWrap: "wrap" } }, [
        el("h2", { text: c.infinitif, style: { fontSize: "28px", color: "var(--accent-ink)" } }),
        el("span", { class: "chip accent", text: grpLabel }),
        el("span", { class: "chip", text: "auxiliaire " + (c.aux === "etre" ? "ĂŞtre" : "avoir") }),
        c.irregulier ? el("span", { class: "chip gold", text: "irrĂŠgulier" }) : null,
      ]),
      el("div", { class: "muted", style: { marginTop: "8px", fontSize: "14.5px" }, html: `Participe prĂŠsent : <strong>${util.escape(c.participePresent || "â")}</strong> Âˇ Participe passĂŠ : <strong>${util.escape(c.participePasse)}</strong> Âˇ GĂŠrondif : <strong>en ${util.escape(c.participePresent || "â")}</strong>` }),
      c.aux === "etre" ? el("div", { class: "note", style: { marginTop: "10px" }, text: "Auxiliaire ĂŞtre : aux temps composĂŠs, le participe s'accorde avec le sujet." }) : null,
    ]));
    const modes = [
      { nom: "Indicatif", mode: "ind", temps: [["PrĂŠsent", c.indicatif.present], ["PassĂŠ composĂŠ", c.indicatif.passeCompose], ["Imparfait", c.indicatif.imparfait], ["Plus-que-parfait", c.indicatif.plusQueParfait], ["PassĂŠ simple", c.indicatif.passeSimple], ["PassĂŠ antĂŠrieur", c.indicatif.passeAnterieur], ["Futur simple", c.indicatif.futurSimple], ["Futur antĂŠrieur", c.indicatif.futurAnterieur]] },
      { nom: "Conditionnel", mode: "ind", temps: [["PrĂŠsent", c.conditionnel.present], ["PassĂŠ", c.conditionnel.passe]] },
      { nom: "Subjonctif", mode: "subj", temps: [["PrĂŠsent", c.subjonctif.present], ["PassĂŠ", c.subjonctif.passe], ["Imparfait", c.subjonctif.imparfait], ["Plus-que-parfait", c.subjonctif.plusQueParfait]] },
      { nom: "ImpĂŠratif", mode: "imp", temps: [["PrĂŠsent", c.imperatif.present], ["PassĂŠ", c.imperatif.passe]] },
    ];
    modes.forEach((m) => {
      if (!m.temps.some(([, f]) => f && f.some((x) => x != null))) return;
      container.appendChild(el("h3", { text: m.nom, style: { fontSize: "18px", margin: "22px 0 12px" } }));
      const grid = el("div", { style: { display: "grid", gap: "12px", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))" } });
      m.temps.forEach(([label, forms]) => { const b = tenseBlock(label, forms, m.mode); if (b) grid.appendChild(b); });
      container.appendChild(grid);
    });
  }
  // Page dĂŠdiĂŠe Ă  la conjugaison d'un verbe.
  function openVerbe(verbe) {
    const v = (verbe || "").trim();
    if (!v) return;
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      const c = el("div", { style: { marginTop: "10px" } });
      root.appendChild(c);
      renderConjugaison(c, v);
    }, { eyebrow: "Conjugaison", title: v });
  }

  function openConjugaison(initialVerb) {
    if (initialVerb) return openVerbe(initialVerb);
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());

      // Recherche (seule ; plus de chips-filtres)
      const search = el("div", { class: "search", style: { margin: "12px 0 6px" } });
      const input = el("input", { type: "text", placeholder: "Rechercher un verbe Ă  conjuguerâŚ", autocapitalize: "none", autocomplete: "off", spellcheck: "false", enterkeyhint: "search" });
      search.append(el("span", { html: IC.search }), input);
      root.appendChild(search);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter" && input.value.trim()) openVerbe(input.value.trim()); });
      root.appendChild(el("div", { class: "muted", style: { fontSize: "12.5px", margin: "0 2px" }, text: "Tape un verbe puis EntrĂŠe, ou choisis-en un dans l'annexe plus bas." }));

      // RĂ¨gles de conjugaison â tout en haut
      root.appendChild(el("h3", { text: "RĂ¨gles de conjugaison", style: { fontSize: "18px", margin: "22px 0 12px" } }));
      (LMJ.data.conjugaisonRegles || []).forEach((r) => root.appendChild(cardNode(r, "rule")));

      // Annexe des verbes â en bas
      root.appendChild(el("h3", { text: "Annexe des verbes", style: { fontSize: "18px", margin: "28px 0 6px" } }));
      root.appendChild(el("div", { class: "muted", style: { fontSize: "12.5px", marginBottom: "12px" }, text: "SĂŠlectionne un verbe pour ouvrir sa conjugaison complĂ¨te." }));
      const cloud = el("div", { style: { display: "flex", flexWrap: "wrap", gap: "8px" } });
      [...new Set(LMJ.verbesAnnexe || [])]
        .filter((v) => LMJ.conjugue(v).disponible)
        .sort((a, b) => a.localeCompare(b, "fr"))
        .forEach((v) => cloud.appendChild(el("button", { class: "chip", style: { cursor: "pointer" }, text: v, on: { click: () => openVerbe(v) } })));
      root.appendChild(cloud);
    }, { eyebrow: "Conjugaison", title: "Conjugueur", sub: "RĂ¨gles + annexe des verbes" });
  }

  /* ---------- Recherche transverse ---------- */
  function buildIndex() {
    const idx = [];
    categories().forEach((cat) => {
      (cat.data || []).forEach((item) => {
        let hay = item.titre + " " + (item.resume || "") + " " + (item.cle || "");
        if (item.explication) hay += " " + item.explication;
        if (item.entrees) hay += " " + item.entrees.map((e) => (e.mot || "") + " " + (e.sens || "")).join(" ");
        if (item.astuce) hay += " " + item.astuce;
        idx.push({ item, type: cat.type === "conjugaison" ? "rule" : cat.type, catNom: cat.nom, hay: util.normSearch(hay) });
      });
    });
    return idx;
  }

  /* ---------- Ăcran racine ---------- */
  function render(root) {
    const cats = categories();
    const idx = buildIndex();

    const search = el("div", { class: "search" });
    const input = el("input", { type: "text", placeholder: "Rechercher une rĂ¨gle, un mot, un verbeâŚ", autocapitalize: "none", autocomplete: "off", spellcheck: "false", enterkeyhint: "search" });
    search.append(el("span", { html: IC.search }), input);
    root.appendChild(search);

    const resultsWrap = el("div");
    const gridWrap = el("div");
    root.append(resultsWrap, gridWrap);

    const grid = el("div", { class: "cat-grid", style: { marginTop: "18px" } });
    cats.forEach((cat) => {
      const n = cat.data ? cat.data.length : 0;
      grid.appendChild(el("button", { class: "cat-tile", on: { click: () => openCategory(cat) } }, [
        el("div", { class: "ic", html: IC[cat.id] || IC.grammaire }),
        el("h3", { text: cat.nom }),
        el("div", { class: "count", text: cat.type === "conjugaison" ? "Conjugueur + " + n + " rĂ¨gles" : n + " fiches" }),
      ]));
    });
    gridWrap.appendChild(grid);

    // Pied de page : compteurs + version (pour vĂŠrifier la mise Ă  jour)
    const totalFiches = cats.reduce((s, c) => s + (c.data ? c.data.length : 0), 0);
    const nbMots = (LMJ.data.mots || []).length;
    gridWrap.appendChild(el("div", {
      class: "muted",
      style: { textAlign: "center", fontSize: "12px", marginTop: "22px", opacity: ".75" },
      text: `${totalFiches} fiches Âˇ ${nbMots} mots Âˇ Le Mot Juste ${LMJ.VERSION || ""}`,
    }));

    function runSearch() {
      const q = util.normSearch(input.value);
      util.clear(resultsWrap);
      if (q.length < 2) { gridWrap.style.display = ""; return; }
      gridWrap.style.display = "none";
      const hits = idx.filter((r) => r.hay.includes(q)).slice(0, 40);
      resultsWrap.appendChild(el("div", { class: "muted", style: { margin: "14px 2px 10px", fontSize: "13.5px" }, text: hits.length + " rĂŠsultat(s)" }));
      if (!hits.length) {
        resultsWrap.appendChild(el("div", { class: "empty" }, [
          el("p", { text: "Aucune rĂ¨gle trouvĂŠe." }),
          /(er|ir|re|oir)$/.test(q) ? el("button", { class: "btn primary", text: "Conjuguer ÂŤ " + input.value.trim() + " Âť", on: { click: () => openConjugaison(input.value.trim()) } }) : null,
        ]));
        return;
      }
      hits.forEach((h) => resultsWrap.appendChild(cardNode(h.item, h.type)));
    }
    let t;
    input.addEventListener("input", () => { clearTimeout(t); t = setTimeout(runSearch, 120); });
  }

  LMJ.views.regles = { render };
})();
