/* =====================================================================
   Le Mot Juste — Design system
   Esthétique éditoriale : papier chaud, encre, accent bordeaux.
   Mobile-first, thème clair + sombre automatique.
   ===================================================================== */

/* ---------- Tokens ---------- */
:root {
  /* Couleurs — clair */
  --paper:        #FAF6EF;
  --paper-2:      #F3ECE0;
  --surface:      #FFFFFF;
  --surface-2:    #FBF8F2;
  --ink:          #211C16;
  --ink-2:        #4A4139;
  --muted:        #857A6D;
  --line:         #E6DCCB;
  --line-strong:  #D8CBB4;

  --accent:       #8E2C3B;   /* bordeaux / encre */
  --accent-soft:  #F3E2E1;
  --accent-ink:   #6E1F2C;
  --gold:         #B4832B;
  --gold-soft:    #F6ECD6;

  --green:        #2F7D51;
  --green-soft:   #E2F0E5;
  --amber:        #B97407;
  --amber-soft:   #FaEBCF;
  --red:          #B23A2E;
  --red-soft:     #F6E0DA;

  /* Typo */
  --serif: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua",
           Georgia, "Noto Serif", "Times New Roman", serif;
  --sans:  -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
           Arial, "Noto Sans", sans-serif;
  --mono:  "SF Mono", ui-monospace, "Menlo", "Roboto Mono", monospace;

  /* Espacement */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px; --sp-4: 16px;
  --sp-5: 24px; --sp-6: 32px; --sp-7: 48px; --sp-8: 64px;

  --radius:    14px;
  --radius-sm: 10px;
  --radius-lg: 22px;

  --shadow-1: 0 1px 2px rgba(33,28,22,.06), 0 2px 8px rgba(33,28,22,.05);
  --shadow-2: 0 6px 24px rgba(33,28,22,.12);

  --tabbar-h: 66px;
  --maxw: 720px;

  color-scheme: light dark;
}

@media (prefers-color-scheme: dark) {
  :root {
    --paper:        #17140F;
    --paper-2:      #1F1B15;
    --surface:      #221E17;
    --surface-2:    #2A251D;
    --ink:          #F1E9DB;
    --ink-2:        #CFC4B2;
    --muted:        #9A8E7C;
    --line:         #352E24;
    --line-strong:  #463D2F;

    --accent:       #E08792;
    --accent-soft:  #3A2226;
    --accent-ink:   #F0AEB6;
    --gold:         #D7AE5E;
    --gold-soft:    #332B18;

    --green:        #6FC28C;
    --green-soft:   #1E2E23;
    --amber:        #E0A94A;
    --amber-soft:   #322913;
    --red:          #E28576;
    --red-soft:     #33211C;

    --shadow-1: 0 1px 2px rgba(0,0,0,.4);
    --shadow-2: 0 8px 28px rgba(0,0,0,.5);
  }
}

/* ---------- Reset & base ---------- */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.5;
  font-size: 17px;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overscroll-behavior-y: none;
}
h1, h2, h3, h4 { font-family: var(--serif); font-weight: 600; line-height: 1.2; margin: 0; }
p { margin: 0 0 var(--sp-3); }
a { color: var(--accent); }
button { font-family: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
::selection { background: var(--accent-soft); }

/* ---------- Layout applicatif ---------- */
#app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter: saturate(140%) blur(10px);
  -webkit-backdrop-filter: saturate(140%) blur(10px);
  border-bottom: 1px solid var(--line);
  padding: calc(env(safe-area-inset-top) + var(--sp-3)) var(--sp-4) var(--sp-3);
}
.app-header .eyebrow {
  font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--accent); font-weight: 700; margin-bottom: 2px;
}
.app-header h1 { font-size: 24px; letter-spacing: -.01em; }
.app-header .sub { color: var(--muted); font-size: 13.5px; margin-top: 2px; }

.view {
  flex: 1;
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
  padding: var(--sp-4) var(--sp-4) calc(var(--tabbar-h) + var(--sp-6) + env(safe-area-inset-bottom));
  animation: fade .28s ease both;
}
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ---------- Barre d'onglets ---------- */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  display: flex;
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter: saturate(150%) blur(14px);
  -webkit-backdrop-filter: saturate(150%) blur(14px);
  border-top: 1px solid var(--line);
  padding-bottom: env(safe-area-inset-bottom);
}
.tabbar button {
  flex: 1;
  border: 0; background: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 4px 8px;
  color: var(--muted);
  font-size: 11px; font-weight: 600; letter-spacing: .01em;
  transition: color .18s;
}
.tabbar button svg { width: 24px; height: 24px; stroke-width: 1.7; }
.tabbar button.active { color: var(--accent); }
.tabbar button.active svg { transform: translateY(-1px); }

/* ---------- Composants ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-1);
  padding: var(--sp-4);
}
.stack > * + * { margin-top: var(--sp-3); }
.muted { color: var(--muted); }
.center { text-align: center; }

/* Puce / catégorie */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 999px;
  background: var(--paper-2); color: var(--ink-2);
  font-size: 12.5px; font-weight: 600;
  border: 1px solid var(--line);
}
.chip.accent { background: var(--accent-soft); color: var(--accent-ink); border-color: transparent; }
.chip.gold   { background: var(--gold-soft); color: var(--gold); border-color: transparent; }

/* Boutons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 18px; border-radius: 999px;
  font-size: 15px; font-weight: 650; cursor: pointer;
  border: 1px solid var(--line-strong); background: var(--surface); color: var(--ink);
  transition: transform .08s, background .18s, border-color .18s;
  min-height: 46px;
}
.btn:active { transform: scale(.97); }
.btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
.btn.primary:disabled { opacity: .5; cursor: default; }
.btn.ghost { background: transparent; border-color: transparent; color: var(--accent); }
.btn.block { width: 100%; }
.btn svg { width: 19px; height: 19px; }

/* Champ de recherche */
.search {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--line-strong);
  border-radius: 999px; padding: 0 16px; height: 48px;
  box-shadow: var(--shadow-1);
}
.search svg { width: 20px; height: 20px; color: var(--muted); flex: none; }
.search input {
  flex: 1; border: 0; background: none; outline: none;
  font-size: 16px; color: var(--ink); font-family: inherit;
}

/* Grille de catégories */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-3); }
.cat-tile {
  text-align: left; cursor: pointer;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); padding: var(--sp-4);
  box-shadow: var(--shadow-1);
  transition: transform .1s, box-shadow .2s;
  display: flex; flex-direction: column; gap: 6px; min-height: 108px;
}
.cat-tile:active { transform: scale(.98); }
.cat-tile .ic {
  width: 38px; height: 38px; border-radius: 11px;
  display: grid; place-items: center; margin-bottom: 4px;
  background: var(--accent-soft); color: var(--accent-ink);
}
.cat-tile .ic svg { width: 21px; height: 21px; }
.cat-tile h3 { font-size: 16.5px; }
.cat-tile .count { font-size: 12.5px; color: var(--muted); font-weight: 600; }

/* Accordéon de règle */
.rule {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-1);
}
.rule + .rule { margin-top: var(--sp-3); }
.rule > summary {
  list-style: none; cursor: pointer; padding: var(--sp-4);
  display: flex; align-items: flex-start; gap: 12px;
  font-family: var(--serif); font-size: 17px; font-weight: 600;
}
.rule > summary::-webkit-details-marker { display: none; }
.rule > summary .marker {
  flex: none; margin-top: 3px; color: var(--accent);
  transition: transform .2s;
}
.rule[open] > summary .marker { transform: rotate(90deg); }
.rule .body { padding: 0 var(--sp-4) var(--sp-4); }
.rule .body p:last-child { margin-bottom: 0; }

/* Exemples correct / incorrect */
.ex { display: flex; gap: 10px; align-items: baseline; padding: 7px 0; }
.ex + .ex { border-top: 1px dashed var(--line); }
.ex .mark { flex: none; font-weight: 700; width: 20px; }
.ex.ok  .mark { color: var(--green); }
.ex.no  .mark { color: var(--red); }
.ex.no  .txt  { text-decoration: line-through; text-decoration-color: var(--red); color: var(--ink-2); }
.ex .txt em { font-style: normal; background: var(--gold-soft); padding: 0 3px; border-radius: 4px; }

.note {
  background: var(--surface-2); border-left: 3px solid var(--gold);
  padding: 10px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: 15px; color: var(--ink-2);
}
.note.astuce { border-color: var(--accent); }

/* Section titre */
.section-head { display: flex; align-items: center; justify-content: space-between; margin: var(--sp-5) 0 var(--sp-3); }
.section-head h2 { font-size: 20px; }
.back {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  background: none; border: 0; color: var(--accent); font-weight: 650; font-size: 15px;
  padding: 8px 0;
}
.back svg { width: 18px; height: 18px; }

/* Comparaison de mots (nuances) */
.nuance-pair { display: grid; gap: var(--sp-3); }
.nuance-word { border: 1px solid var(--line); border-radius: var(--radius-sm); padding: var(--sp-3) var(--sp-4); background: var(--surface-2); }
.nuance-word .w { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--accent-ink); }
.nuance-word .d { font-size: 15px; color: var(--ink-2); margin-top: 2px; }
.nuance-word .e { font-size: 14.5px; color: var(--muted); font-style: italic; margin-top: 6px; }

/* ---------- Mot du jour ---------- */
.mdj-card {
  background: linear-gradient(160deg, var(--surface), var(--surface-2));
  border: 1px solid var(--line); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-2); padding: var(--sp-6) var(--sp-5) var(--sp-5);
  position: relative; overflow: hidden;
}
.mdj-card::before {
  content: "«»"; position: absolute; top: -18px; right: 8px;
  font-family: var(--serif); font-size: 120px; color: var(--accent);
  opacity: .06; pointer-events: none;
}
.mdj-date { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
.mdj-word { font-family: var(--serif); font-size: 40px; font-weight: 600; letter-spacing: -.01em; margin: 6px 0 2px; color: var(--accent-ink); line-height: 1.05; }
.mdj-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin: 4px 0 var(--sp-3); }
.mdj-pron { color: var(--muted); font-style: italic; }
.mdj-def { font-size: 18px; line-height: 1.5; }
.mdj-block { margin-top: var(--sp-4); }
.mdj-block .lbl { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
.mdj-ex { font-family: var(--serif); font-size: 16.5px; font-style: italic; color: var(--ink-2); padding-left: 14px; border-left: 2px solid var(--line-strong); }
.mdj-ex + .mdj-ex { margin-top: 10px; }
.syn-list { display: flex; flex-wrap: wrap; gap: 7px; }
.mdj-actions { display: flex; gap: 10px; margin-top: var(--sp-5); }

.hist-item {
  display: flex; align-items: center; gap: 12px; padding: var(--sp-3) 0;
  cursor: pointer; border-bottom: 1px solid var(--line);
}
.hist-item .w { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.hist-item .dt { margin-left: auto; font-size: 12.5px; color: var(--muted); }

/* ---------- Dictée ---------- */
.level-list { display: grid; gap: var(--sp-3); }
.level-card {
  cursor: pointer; text-align: left; width: 100%;
  border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--surface); padding: var(--sp-4); box-shadow: var(--shadow-1);
  display: flex; align-items: center; gap: var(--sp-4);
  transition: transform .1s;
}
.level-card:active { transform: scale(.98); }
.level-dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
.level-facile       .level-dot { background: var(--green); }
.level-intermediaire .level-dot { background: var(--amber); }
.level-expert       .level-dot { background: var(--red); }
.level-card h3 { font-size: 17px; }
.level-card .meta { font-size: 13px; color: var(--muted); }
.level-badge { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; padding: 4px 9px; border-radius: 999px; }
.level-facile .level-badge        { background: var(--green-soft); color: var(--green); }
.level-intermediaire .level-badge { background: var(--amber-soft); color: var(--amber); }
.level-expert .level-badge        { background: var(--red-soft); color: var(--red); }

.player {
  display: flex; align-items: center; justify-content: center; gap: var(--sp-4);
  padding: var(--sp-4); background: var(--surface-2);
  border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: var(--sp-4);
}
.play-btn {
  width: 64px; height: 64px; border-radius: 50%; border: 0; cursor: pointer;
  background: var(--accent); color: #fff; display: grid; place-items: center;
  box-shadow: var(--shadow-2); transition: transform .1s;
}
.play-btn:active { transform: scale(.94); }
.play-btn svg { width: 28px; height: 28px; }
.speed-ctl { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); }
.speed-ctl input { width: 110px; }

.dictee-input {
  width: 100%; min-height: 180px; resize: vertical;
  font-family: var(--serif); font-size: 17px; line-height: 1.7;
  padding: var(--sp-4); border: 1px solid var(--line-strong);
  border-radius: var(--radius); background: var(--surface); color: var(--ink);
  outline: none;
}
.dictee-input:focus { border-color: var(--accent); }

/* Résultat de dictée */
.score-ring { display: flex; align-items: center; gap: var(--sp-4); }
.score-num { font-family: var(--serif); font-size: 46px; font-weight: 600; }
.score-num small { font-size: 20px; color: var(--muted); }
.diff { font-family: var(--serif); font-size: 17px; line-height: 1.9; word-spacing: .04em; }
.diff .ok  { }
.diff .bad { background: var(--red-soft); color: var(--red); border-radius: 4px; padding: 0 3px; text-decoration: line-through; text-decoration-color: var(--red); }
.diff .miss{ background: var(--green-soft); color: var(--green); border-radius: 4px; padding: 0 3px; }
.diff .ins { background: var(--amber-soft); color: var(--amber); border-radius: 4px; padding: 0 3px; }
.legend { display: flex; flex-wrap: wrap; gap: 14px; font-size: 13px; color: var(--muted); margin-top: var(--sp-3); }
.legend span { display: inline-flex; align-items: center; gap: 6px; }
.legend i { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

/* Divers */
.empty { text-align: center; color: var(--muted); padding: var(--sp-7) var(--sp-4); }
.empty svg { width: 46px; height: 46px; opacity: .4; margin-bottom: var(--sp-3); }
.spacer { height: var(--sp-4); }
.hidden { display: none !important; }

@media (min-width: 560px) {
  .cat-grid { grid-template-columns: 1fr 1fr 1fr; }
}

/* ---------- Carte de règle (liste) ---------- */
.rule-card {
  display: flex; align-items: center; gap: 14px; width: 100%; text-align: left; cursor: pointer;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
  box-shadow: var(--shadow-1); padding: 16px 18px;
  transition: transform .1s, box-shadow .2s, border-color .2s;
}
.rule-card:active { transform: scale(.99); }
.rule-card:hover { border-color: var(--line-strong); }
.rule-card + .rule-card { margin-top: 10px; }
.rule-card .rc-body { flex: 1; min-width: 0; }
.rule-card .rc-title { font-family: var(--serif); font-weight: 500; font-size: 18px; letter-spacing: -.005em; color: var(--ink); }
.rule-card .rc-sub { font-size: 13.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.rule-card .rc-arrow { color: var(--line-strong); flex: none; display: grid; place-items: center; }
.rule-card:hover .rc-arrow { color: var(--accent); }

/* ---------- Page « cours » ---------- */
.cours-title { font-family: var(--serif); font-size: 27px; font-weight: 600; color: var(--accent-ink); line-height: 1.15; margin: 4px 0 6px; }
.cours-lead { font-size: 16px; color: var(--muted); margin-bottom: 18px; }
.cours-body { font-size: 16.5px; line-height: 1.62; }
.cours-body p { margin: 0 0 12px; }
.cours-section-lbl { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin: 22px 0 8px; }

/* ---------- Quiz ---------- */
.quiz-progress { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
.quiz-bar { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
.quiz-bar > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width .35s ease; }
.quiz-question { font-family: var(--serif); font-size: 21px; line-height: 1.5; margin-bottom: 20px; }
.quiz-blank { display: inline-block; min-width: 60px; border-bottom: 2.5px dashed var(--accent); vertical-align: baseline; }
.quiz-opts { display: flex; flex-direction: column; gap: 10px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; cursor: pointer;
  padding: 15px 18px; border: 1.5px solid var(--line-strong); border-radius: var(--radius);
  background: var(--surface); font-family: var(--serif); font-size: 17.5px; color: var(--ink);
  transition: background .15s, border-color .15s, transform .08s, opacity .2s;
}
.quiz-opt:active { transform: scale(.99); }
.quiz-opt .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--line-strong); flex: none; display: grid; place-items: center; }
.quiz-opt .dot svg { width: 14px; height: 14px; }
.quiz-opt.correct { border-color: var(--green); background: var(--green-soft); }
.quiz-opt.correct .dot { border-color: var(--green); background: var(--green); color: #fff; }
.quiz-opt.wrong { border-color: var(--red); background: var(--red-soft); }
.quiz-opt.wrong .dot { border-color: var(--red); background: var(--red); color: #fff; }
.quiz-opt.locked { cursor: default; }
.quiz-opt.dim { opacity: .5; }
.quiz-explain { margin-top: 18px; }
.quiz-result { text-align: center; padding: 24px 0 8px; }
.quiz-medal { font-size: 54px; line-height: 1; margin-bottom: 10px; }
.quiz-score { font-family: var(--serif); font-size: 56px; font-weight: 600; color: var(--accent-ink); line-height: 1; }
.quiz-score small { font-size: 26px; color: var(--muted); }

<script>
/* ===== js/core.js ===== */
/* =====================================================================
   Le Mot Juste — noyau partagé
   Namespace global, utilitaires DOM, helpers de stockage local.
   Chargé en premier : tous les autres scripts en dépendent.
   ===================================================================== */
(function () {
  "use strict";

  const G = typeof window !== "undefined" ? window : globalThis;
  const LMJ = (G.LMJ = G.LMJ || {});
  LMJ.data = LMJ.data || {};
  LMJ.views = LMJ.views || {};

  /* ---------- Utilitaires DOM ---------- */
  const util = {
    /** Sélecteur simple */
    $(sel, root) {
      return (root || document).querySelector(sel);
    },
    $$(sel, root) {
      return Array.from((root || document).querySelectorAll(sel));
    },
    /**
     * Crée un élément. props : {class, text, html, on:{event:fn}, dataset:{}, ...attrs}
     * children : Node | string | Array
     */
    el(tag, props, children) {
      const node = document.createElement(tag);
      if (props) {
        for (const [k, v] of Object.entries(props)) {
          if (v == null) continue;
          if (k === "class") node.className = v;
          else if (k === "text") node.textContent = v;
          else if (k === "html") node.innerHTML = v;
          else if (k === "on") {
            for (const [ev, fn] of Object.entries(v)) node.addEventListener(ev, fn);
          } else if (k === "dataset") {
            for (const [dk, dv] of Object.entries(v)) node.dataset[dk] = dv;
          } else if (k === "style" && typeof v === "object") {
            Object.assign(node.style, v);
          } else {
            node.setAttribute(k, v);
          }
        }
      }
      if (children != null) util.append(node, children);
      return node;
    },
    append(node, children) {
      if (Array.isArray(children)) {
        children.forEach((c) => c != null && util.append(node, c));
      } else if (children instanceof Node) {
        node.appendChild(children);
      } else {
        node.appendChild(document.createTextNode(String(children)));
      }
      return node;
    },
    clear(node) {
      while (node.firstChild) node.removeChild(node.firstChild);
      return node;
    },
    escape(str) {
      const d = document.createElement("div");
      d.textContent = str == null ? "" : String(str);
      return d.innerHTML;
    },

    /* ---------- Texte / normalisation ---------- */
    /** minuscule + suppression des accents (pour recherche & comparaison) */
    deburr(str) {
      return (str || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[̀-ͯ]/g, "");
    },
    /** normalise pour la recherche : deburr + trim des espaces multiples */
    normSearch(str) {
      return util.deburr(str).replace(/\s+/g, " ").trim();
    },

    /* ---------- Dates ---------- */
    /** Clé du jour AAAA-MM-JJ en heure locale */
    todayKey(d) {
      const date = d || new Date();
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const j = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${j}`;
    },
    /** Nombre de jours depuis une époque fixe (2024-01-01) */
    dayNumber(d) {
      const date = d || new Date();
      const epoch = Date.UTC(2024, 0, 1);
      const today = Date.UTC(date.getFullYear(), date.getMonth(), date.getDate());
      return Math.floor((today - epoch) / 86400000);
    },
    frDate(d) {
      const date = d || new Date();
      return date.toLocaleDateString("fr-FR", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric",
      });
    },

    /* ---------- Divers ---------- */
    /** hash entier stable d'une chaîne */
    hash(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    },
  };

  /* ---------- Stockage local (progrès, historique, favoris) ---------- */
  const PREFIX = "lmj.";
  const store = {
    get(key, fallback) {
      try {
        const raw = localStorage.getItem(PREFIX + key);
        return raw == null ? fallback : JSON.parse(raw);
      } catch (e) {
        return fallback;
      }
    },
    set(key, value) {
      try {
        localStorage.setItem(PREFIX + key, JSON.stringify(value));
        return true;
      } catch (e) {
        return false;
      }
    },
    remove(key) {
      try {
        localStorage.removeItem(PREFIX + key);
      } catch (e) {}
    },
  };

  /* ---------- Synthèse vocale (Web Speech API) — hors-ligne via voix système ---------- */
  const tts = {
    supported: typeof window !== "undefined" && "speechSynthesis" in window,
    voices: [],
    frVoice: null,
    _ready: false,

    refresh() {
      if (!tts.supported) return;
      tts.voices = window.speechSynthesis.getVoices() || [];
      const fr = tts.voices.filter((v) => /^fr/i.test(v.lang));
      // Préférer une voix locale (fonctionne hors-ligne)
      tts.frVoice =
        fr.find((v) => v.localService) ||
        fr.find((v) => /fr[-_]FR/i.test(v.lang)) ||
        fr[0] ||
        null;
      tts._ready = true;
    },
    init() {
      if (!tts.supported || tts._ready) return;
      tts.refresh();
      window.speechSynthesis.addEventListener("voiceschanged", tts.refresh);
    },
    /** Parle un texte. opts : {rate, pitch, onstart, onend, onboundary} */
    speak(text, opts) {
      opts = opts || {};
      if (!tts.supported) { opts.onend && opts.onend(); return null; }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "fr-FR";
      if (tts.frVoice) u.voice = tts.frVoice;
      u.rate = opts.rate != null ? opts.rate : 1;
      u.pitch = opts.pitch != null ? opts.pitch : 1;
      if (opts.onstart) u.onstart = opts.onstart;
      if (opts.onend) u.onend = opts.onend;
      if (opts.onboundary) u.onboundary = opts.onboundary;
      window.speechSynthesis.speak(u);
      return u;
    },
    cancel() { if (tts.supported) window.speechSynthesis.cancel(); },
    pause() { if (tts.supported) window.speechSynthesis.pause(); },
    resume() { if (tts.supported) window.speechSynthesis.resume(); },
  };

  LMJ.util = util;
  LMJ.store = store;
  LMJ.tts = tts;
  LMJ.VERSION = "v8";
})();

/* =====================================================================
   Le Mot Juste — Moteur de conjugaison
   • 1er groupe (-er) : algorithmique, avec toutes les variantes
     orthographiques (-cer, -ger, -yer, -eler/-eter, é→è, e muet→è).
   • 2e groupe (-ir, type finir) : algorithmique.
   • 3e groupe : dérivé des « parties principales » de data/verbes.js.
   Temps composés construits automatiquement (auxiliaire conjugué + pp).

   API : LMJ.conjugue("manger") → objet structuré (voir bas de fichier).
   ===================================================================== */
(function () {
  "use strict";
  const G = typeof window !== "undefined" ? window : globalThis;
  const LMJ = (G.LMJ = G.LMJ || {});
  const V = LMJ.data.verbes;

  /* ---------- Terminaisons ---------- */
  const FUT = ["ai", "as", "a", "ons", "ez", "ont"];
  const COND = ["ais", "ais", "ait", "ions", "iez", "aient"];
  const IMPF = ["ais", "ais", "ait", "ions", "iez", "aient"];

    return {
      a: ["ai", "as", "a", "âmes", "âtes", "èrent"],
      i: ["is", "is", "it", "îmes", "îtes", "irent"],
      u: ["us", "us", "ut", "ûmes", "ûtes", "urent"],
      in: ["ins", "ins", "int", "înmes", "întes", "inrent"],
    }[type];
  }
  function subjImpEnds(type) {
    return {
      a: ["asse", "asses", "ât", "assions", "assiez", "assent"],
      i: ["isse", "isses", "ît", "issions", "issiez", "issent"],
      u: ["usse", "usses", "ût", "ussions", "ussiez", "ussent"],
      in: ["insse", "insses", "înt", "inssions", "inssiez", "inssent"],
    }[type];
  }

  const map6 = (stem, ends) => ends.map((e) => (e == null ? null : stem + e));

  /* =====================================================================
     3e groupe — dérivation depuis les parties principales
     ===================================================================== */
  function simpleFromParts(parts) {
    const t = {
      infinitif: parts.infinitif,
      participePresent: parts.ppr,
      participePasse: parts.pp,
      present: parts.pres.slice(),
    };

    // Imparfait : fourni, ou dérivé du « nous » présent (…ons → …ais)
    if (parts.imp) t.imparfait = parts.imp.slice();
    else {
      const stem = parts.pres[3].replace(/ons$/, "");
      t.imparfait = map6(stem, IMPF);
    }

    t.futurSimple = map6(parts.futStem, FUT);
    t.conditionnelPresent = map6(parts.futStem, COND);

    const [psStem, psType] = parts.ps;
    t.passeSimple = map6(psStem, psEnds(psType));
    t.subjonctifImparfait = map6(psStem, subjImpEnds(psType));

    if (parts.subjForms) t.subjonctifPresent = parts.subjForms.slice();
    else {
      const [ss, sp] = parts.subj;
      t.subjonctifPresent = [ss + "e", ss + "es", ss + "e", sp + "ions", sp + "iez", ss + "ent"];
    }

    if (parts.imper === false) t.imperatifPresent = null;
    else if (Array.isArray(parts.imper)) t.imperatifPresent = parts.imper.slice();
    else {
      let tu = parts.pres[1];
      if (/es$/.test(tu)) tu = tu.slice(0, -1);
      t.imperatifPresent = [tu, parts.pres[3], parts.pres[4]];
    }
    return t;
  }

  /* Auxiliaires pré-conjugués (pour les temps composés) */
  const AUX = {
    avoir: simpleFromParts(Object.assign({ infinitif: "avoir" }, V["avoir"])),
    etre: simpleFromParts(Object.assign({ infinitif: "être" }, V["être"])),
  };

  function compound(auxKey, pp) {
    const a = AUX[auxKey];
    const j = (arr) => arr.map((f) => (f == null ? null : f + " " + pp));
    return {
      passeCompose: j(a.present),
      plusQueParfait: j(a.imparfait),
      passeAnterieur: j(a.passeSimple),

      conditionnelPasse: j(a.conditionnelPresent),

    } else if (/e[bcdfghjklmnpqrstvwxzç]+$/.test(stem)) {
      modStem = graveLastE(stem); // e muet → è
      futUsesMod = true;
    }

    const silent = (i) => i === 0 || i === 1 || i === 2 || i === 5; // je,tu,il,ils

    const present = ["e", "es", "e", "ons", "ez", "ent"].map((e, i) =>
      soft(silent(i) ? modStem : stem, e)
    );
    const subjPres = ["e", "es", "e", "ions", "iez", "ent"].map((e, i) =>
      soft(silent(i) ? modStem : stem, e)
    );

    const subjImp = subjImpEnds("a").map((e) => soft(stem, e));

      infinitif: inf,
      participePresent: soft(stem, "ant"),
      participePasse: stem + "é",

      futurSimple: map6(futStem, FUT),
      conditionnelPresent: map6(futStem, COND),
      passeSimple,

      subjonctifImparfait: subjImp,

    };

  function group2Simple(inf) {

      participePresent: stem + "issant",
      participePasse: stem + "i",
      present: [stem + "is", stem + "is", stem + "it", stem + "issons", stem + "issez", stem + "issent"],

      passeSimple: map6(stem, psEnds("i")),
      subjonctifPresent: map6(stem + "iss", ["e", "es", "e", "ions", "iez", "ent"]),
      subjonctifImparfait: map6(stem, subjImpEnds("i")),

  /* =====================================================================
     Assemblage & détection du type
     ===================================================================== */
  function determineAux(inf, irr) {
    if (irr && irr.aux) return irr.aux;

  function assemble(inf, groupe, irregulier, aux, simple, pp, impersonnel) {

    const res = {

      infinitif: inf,
      groupe,

      participePresent: simple.participePresent,

        passeCompose: comp.passeCompose,
        plusQueParfait: comp.plusQueParfait,
        passeAnterieur: comp.passeAnterieur,
        futurAnterieur: comp.futurAnterieur,

      subjonctif: {

        imparfait: simple.subjonctifImparfait,
        passe: comp.subjonctifPasse,
        plusQueParfait: comp.subjonctifPlusQueParfait,

    };

      for (const tps of Object.values(res.indicatif)) void tps;
      ["indicatif", "conditionnel", "subjonctif"].forEach((mode) => {

          el("span", { text: `Score : ${state.score}` }),
        ]));
        host.appendChild(el("div", { class: "quiz-bar" }, el("i", { style: { width: Math.round((state.i / questions.length) * 100) + "%" } })));

        // Badge de niveau
        const niv = NIVEAUX[q._n || 1];
        host.appendChild(el("div", { style: { marginBottom: "14px" } }, el("span", { class: "niv-badge " + niv.cls, text: niv.nom })));

        // Question / phrase à trou
        host.appendChild(sentenceNode(q, state.answered ? q.options[q.reponse] : null));

        // Options
        const opts = el("div", { class: "quiz-opts" });
        q.options.forEach((opt, idx) => {
          const dot = el("span", { class: "dot" });
          const b = el("button", { class: "quiz-opt" }, [dot, document.createTextNode(opt)]);
          if (state.answered) {
            b.classList.add("locked");
            if (idx === q.reponse) { b.classList.add("correct"); dot.innerHTML = IC.check; }
            else if (idx === state.chosen) { b.classList.add("wrong"); dot.innerHTML = IC.cross; }
            else b.classList.add("dim");
          } else {
            b.addEventListener("click", () => {
              state.answered = true; state.chosen = idx;
              if (idx === q.reponse) state.score++;
              draw();
            });
          }
          opts.appendChild(b);
        });
        host.appendChild(opts);

        // Explication + suite
        if (state.answered) {
          const ok = state.chosen === q.reponse;
          host.appendChild(el("div", { class: "note astuce quiz-explain" }, [
            el("strong", { text: ok ? "Bravo ! " : "Pas tout à fait. " }),
            document.createTextNode(q.explication || ""),
          ]));
          const last = state.i === questions.length - 1;
          host.appendChild(el("button", {
            class: "btn primary block", style: { marginTop: "18px" },
            text: last ? "Voir le résultat" : "Question suivante",
            on: { click: () => { state.i++; state.answered = false; state.chosen = -1; draw(); window.scrollTo({ top: 0 }); } },
          }));
        }
      }

      function drawResult() {
        const total = questions.length;
        const r = state.score / total;
        const medal = r === 1 ? "🏆" : r >= 0.7 ? "🎉" : r >= 0.5 ? "👍" : "📚";
        const msg = r === 1 ? "Sans faute, parfait !" : r >= 0.7 ? "Très bon score !" : r >= 0.5 ? "Pas mal, continue !" : "Relis la fiche et retente ta chance.";
        util.clear(host);
        host.appendChild(el("div", { class: "quiz-result" }, [
          el("div", { class: "quiz-medal", text: medal }),
          el("div", { class: "quiz-score", html: `${state.score}<small> / ${total}</small>` }),
          el("div", { class: "muted", style: { marginTop: "8px", fontSize: "16px" }, text: msg }),
        ]));
        host.appendChild(el("button", {
          class: "btn primary block", style: { marginTop: "18px" }, text: "Recommencer le quiz",
          on: { click: () => { questions = buildRamp(item); state.i = 0; state.score = 0; state.answered = false; state.chosen = -1; draw(); window.scrollTo({ top: 0 }); } },
        }));
        host.appendChild(el("button", { class: "btn block", style: { marginTop: "10px" }, text: "Retour à la fiche", on: { click: () => LMJ.nav.back() } }));
      }

      draw();
    }, { eyebrow: "Quiz", title: item.titre });
  }

  function sentenceNode(q, revealWord) {
    if (q.q.indexOf("___") === -1) return el("div", { class: "quiz-question", text: q.q });
    const parts = q.q.split("___");
    const frag = el("div", { class: "quiz-question" });
    frag.appendChild(document.createTextNode(parts[0]));
    if (revealWord) {
      frag.appendChild(el("strong", { style: { color: "var(--accent-ink)" }, text: revealWord }));
    } else {
      frag.appendChild(el("span", { class: "quiz-blank", html: "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;" }));
    }
    frag.appendChild(document.createTextNode(parts.slice(1).join("___")));
    return frag;
  }

  /* ---------- Écran d'une catégorie ---------- */
  function openCategory(cat) {
    if (cat.type === "conjugaison") return openConjugaison();
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      root.appendChild(el("div", { class: "spacer" }));
      (cat.data || []).forEach((item) => root.appendChild(cardNode(item, cat.type)));
    }, { eyebrow: "Les règles", title: cat.nom, sub: cat.desc });
  }

  /* =====================================================================
     Conjugueur (inchangé sur le fond ; les règles de conjugaison passent
     en cartes légères → page cours → quiz).
     ===================================================================== */
  const PRO_IND = ["je", "tu", "il/elle", "nous", "vous", "ils/elles"];
  const PRO_SUBJ = ["que je", "que tu", "qu'il/elle", "que nous", "que vous", "qu'ils/elles"];
  const IMP_LBL = ["(tu)", "(nous)", "(vous)"];
  function elide(pro, form) {
    const voyelle = /^[aàâeéèêiîïoôu ùûyh]/i.test(form);
    if (voyelle) { if (pro === "je") return "j'" + form; if (pro === "que je") return "que j'" + form; }
    return pro + " " + form;
  }
  function tenseBlock(label, forms, mode) {
    if (!forms) return null;
    const box = el("div", { class: "card", style: { padding: "14px 16px" } });
    box.appendChild(el("div", { style: { fontSize: "11px", letterSpacing: ".1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: "700", marginBottom: "8px" }, text: label }));
    const list = el("div", { style: { fontFamily: "var(--serif)", fontSize: "16px", lineHeight: "1.85" } });
    forms.forEach((f, i) => {
      if (f == null) return;
      let txt = mode === "imp" ? f + " " : elide(mode === "subj" ? PRO_SUBJ[i] : PRO_IND[i], f);
      list.appendChild(el("div", null, [
        mode === "imp" ? el("span", { class: "muted", style: { fontSize: "12px", marginRight: "6px" }, text: IMP_LBL[i] }) : null,
        document.createTextNode(txt),
      ]));
    });
    box.appendChild(list);
    return box;
  }
  function renderConjugaison(container, verbe) {
    util.clear(container);
    const c = LMJ.conjugue(verbe);
    if (!c.disponible) {
      container.appendChild(el("div", { class: "empty" }, [
        el("div", { html: IC.search }),
        el("p", { html: `Le verbe <strong>« ${util.escape(c.infinitif)} »</strong> n'est pas encore dans la base.` }),
        el("p", { class: "muted", text: "Le moteur couvre tous les verbes en -er et -ir réguliers, plus une cinquantaine d'irréguliers essentiels." }),
      ]));
      return;
    }
    const grpLabel = c.groupe === 1 ? "1er groupe" : c.groupe === 2 ? "2e groupe" : "3e groupe";
    container.appendChild(el("div", { class: "card", style: { marginBottom: "16px", background: "var(--surface-2)" } }, [
      el("div", { style: { display: "flex", alignItems: "baseline", gap: "10px", flexWrap: "wrap" } }, [
        el("h2", { text: c.infinitif, style: { fontSize: "28px", color: "var(--accent-ink)" } }),
        el("span", { class: "chip accent", text: grpLabel }),
        el("span", { class: "chip", text: "auxiliaire " + (c.aux === "etre" ? "être" : "avoir") }),
        c.irregulier ? el("span", { class: "chip gold", text: "irrégulier" }) : null,
      ]),
      el("div", { class: "muted", style: { marginTop: "8px", fontSize: "14.5px" }, html: `Participe présent : <strong>${util.escape(c.participePresent || "—")}</strong> · Participe passé : <strong>${util.escape(c.participePasse)}</strong> · Gérondif : <strong>en ${util.escape(c.participePresent || "—")}</strong>` }),
      c.aux === "etre" ? el("div", { class: "note", style: { marginTop: "10px" }, text: "Auxiliaire être : aux temps composés, le participe s'accorde avec le sujet." }) : null,
    ]));
    const modes = [
      { nom: "Indicatif", mode: "ind", temps: [["Présent", c.indicatif.present], ["Passé composé", c.indicatif.passeCompose], ["Imparfait", c.indicatif.imparfait], ["Plus-que-parfait", c.indicatif.plusQueParfait], ["Passé simple", c.indicatif.passeSimple], ["Passé antérieur", c.indicatif.passeAnterieur], ["Futur simple", c.indicatif.futurSimple], ["Futur antérieur", c.indicatif.futurAnterieur]] },
      { nom: "Conditionnel", mode: "ind", temps: [["Présent", c.conditionnel.present], ["Passé", c.conditionnel.passe]] },
      { nom: "Subjonctif", mode: "subj", temps: [["Présent", c.subjonctif.present], ["Passé", c.subjonctif.passe], ["Imparfait", c.subjonctif.imparfait], ["Plus-que-parfait", c.subjonctif.plusQueParfait]] },
      { nom: "Impératif", mode: "imp", temps: [["Présent", c.imperatif.present], ["Passé", c.imperatif.passe]] },
    ];
    modes.forEach((m) => {
      if (!m.temps.some(([, f]) => f && f.some((x) => x != null))) return;
      container.appendChild(el("h3", { text: m.nom, style: { fontSize: "18px", margin: "22px 0 12px" } }));
      const grid = el("div", { style: { display: "grid", gap: "12px", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))" } });
      m.temps.forEach(([label, forms]) => { const b = tenseBlock(label, forms, m.mode); if (b) grid.appendChild(b); });
      container.appendChild(grid);
    });
  }
  // Page dédiée à la conjugaison d'un verbe.
  function openVerbe(verbe) {
    const v = (verbe || "").trim();
    if (!v) return;
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      const c = el("div", { style: { marginTop: "10px" } });
      root.appendChild(c);
      renderConjugaison(c, v);
    }, { eyebrow: "Conjugaison", title: v });
  }

  function openConjugaison(initialVerb) {
    if (initialVerb) return openVerbe(initialVerb);
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());

      // Recherche (seule ; plus de chips-filtres)
      const search = el("div", { class: "search", style: { margin: "12px 0 6px" } });
      const input = el("input", { type: "text", placeholder: "Rechercher un verbe à conjuguer…", autocapitalize: "none", autocomplete: "off", spellcheck: "false", enterkeyhint: "search" });
      search.append(el("span", { html: IC.search }), input);
      root.appendChild(search);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter" && input.value.trim()) openVerbe(input.value.trim()); });
      root.appendChild(el("div", { class: "muted", style: { fontSize: "12.5px", margin: "0 2px" }, text: "Tape un verbe puis Entrée, ou choisis-en un dans l'annexe plus bas." }));

      // Règles de conjugaison — tout en haut
      root.appendChild(el("h3", { text: "Règles de conjugaison", style: { fontSize: "18px", margin: "22px 0 12px" } }));
      (LMJ.data.conjugaisonRegles || []).forEach((r) => root.appendChild(cardNode(r, "rule")));

      // Annexe des verbes — en bas
      root.appendChild(el("h3", { text: "Annexe des verbes", style: { fontSize: "18px", margin: "28px 0 6px" } }));
      root.appendChild(el("div", { class: "muted", style: { fontSize: "12.5px", marginBottom: "12px" }, text: "Sélectionne un verbe pour ouvrir sa conjugaison complète." }));
      const cloud = el("div", { style: { display: "flex", flexWrap: "wrap", gap: "8px" } });
      [...new Set(LMJ.verbesAnnexe || [])]
        .filter((v) => LMJ.conjugue(v).disponible)
        .sort((a, b) => a.localeCompare(b, "fr"))
        .forEach((v) => cloud.appendChild(el("button", { class: "chip", style: { cursor: "pointer" }, text: v, on: { click: () => openVerbe(v) } })));
      root.appendChild(cloud);
    }, { eyebrow: "Conjugaison", title: "Conjugueur", sub: "Règles + annexe des verbes" });
  }

  /* ---------- Recherche transverse ---------- */
  function buildIndex() {
    const idx = [];
    categories().forEach((cat) => {
      (cat.data || []).forEach((item) => {
        let hay = item.titre + " " + (item.resume || "") + " " + (item.cle || "");
        if (item.explication) hay += " " + item.explication;
        if (item.entrees) hay += " " + item.entrees.map((e) => (e.mot || "") + " " + (e.sens || "")).join(" ");
        if (item.astuce) hay += " " + item.astuce;
        idx.push({ item, type: cat.type === "conjugaison" ? "rule" : cat.type, catNom: cat.nom, hay: util.normSearch(hay) });
      });
    });
    return idx;
  }

  /* ---------- Écran racine ---------- */
  function render(root) {
    const cats = categories();
    const idx = buildIndex();

    const search = el("div", { class: "search" });
    const input = el("input", { type: "text", placeholder: "Rechercher une règle, un mot, un verbe…", autocapitalize: "none", autocomplete: "off", spellcheck: "false", enterkeyhint: "search" });
    search.append(el("span", { html: IC.search }), input);
    root.appendChild(search);

    const resultsWrap = el("div");
    const gridWrap = el("div");
    root.append(resultsWrap, gridWrap);

    const grid = el("div", { class: "cat-grid", style: { marginTop: "18px" } });
    cats.forEach((cat) => {
      const n = cat.data ? cat.data.length : 0;
      grid.appendChild(el("button", { class: "cat-tile", on: { click: () => openCategory(cat) } }, [
        el("div", { class: "ic", html: IC[cat.id] || IC.grammaire }),
        el("h3", { text: cat.nom }),
        el("div", { class: "count", text: cat.type === "conjugaison" ? "Conjugueur + " + n + " règles" : n + " fiches" }),
      ]));
    });
    gridWrap.appendChild(grid);

    // Pied de page : compteurs + version (pour vérifier la mise à jour)
    const totalFiches = cats.reduce((s, c) => s + (c.data ? c.data.length : 0), 0);
    const nbMots = (LMJ.data.mots || []).length;
    gridWrap.appendChild(el("div", {
      class: "muted",
      style: { textAlign: "center", fontSize: "12px", marginTop: "22px", opacity: ".75" },
      text: `${totalFiches} fiches · ${nbMots} mots · Le Mot Juste ${LMJ.VERSION || ""}`,
    }));

    function runSearch() {
      const q = util.normSearch(input.value);
      util.clear(resultsWrap);
      if (q.length < 2) { gridWrap.style.display = ""; return; }
      gridWrap.style.display = "none";
      const hits = idx.filter((r) => r.hay.includes(q)).slice(0, 40);
      resultsWrap.appendChild(el("div", { class: "muted", style: { margin: "14px 2px 10px", fontSize: "13.5px" }, text: hits.length + " résultat(s)" }));
      if (!hits.length) {
        resultsWrap.appendChild(el("div", { class: "empty" }, [
          el("p", { text: "Aucune règle trouvée." }),
          /(er|ir|re|oir)$/.test(q) ? el("button", { class: "btn primary", text: "Conjuguer « " + input.value.trim() + " »", on: { click: () => openConjugaison(input.value.trim()) } }) : null,
        ]));
        return;
      }
      hits.forEach((h) => resultsWrap.appendChild(cardNode(h.item, h.type)));
    }
    let t;
    input.addEventListener("input", () => { clearTimeout(t); t = setTimeout(runSearch, 120); });
  }

  LMJ.views.regles = { render };
})();


/* ===== js/view-motdujour.js ===== */
/* =====================================================================
   Le Mot Juste — Vue « Mot du jour »
   Tirage déterministe par date, définition + exemples, prononciation,
   favoris, historique, exploration aléatoire.
   ===================================================================== */
(function () {
  "use strict";
  const G = typeof window !== "undefined" ? window : globalThis;
  const LMJ = (G.LMJ = G.LMJ || {});
  const { util, store, tts } = LMJ;
  const el = util.el.bind(util);

  const IC = {
    speak: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>',
    heart: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.5 1.1-1a5.5 5.5 0 0 0 0-7.9z"/></svg>',
    heartFull: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.5 1.1-1a5.5 5.5 0 0 0 0-7.9z"/></svg>',
    dice: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1.3" fill="currentColor"/></svg>',
    back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  };

  const mots = () => LMJ.data.mots || [];
  const wordFor = (date) => { const m = mots(); return m.length ? m[((util.dayNumber(date) % m.length) + m.length) % m.length] : null; };

  const getFavs = () => store.get("favoris", []);
  const isFav = (mot) => getFavs().indexOf(mot) !== -1;
  function toggleFav(mot) {
    const f = getFavs();
    const i = f.indexOf(mot);
    if (i === -1) f.push(mot); else f.splice(i, 1);
    store.set("favoris", f);
    return i === -1;
  }
  const findMot = (nom) => mots().find((m) => m.mot === nom);

  /* ---------- Carte d'un mot ---------- */
  function chips(m) {
    const box = el("div", { class: "mdj-meta" });
    box.appendChild(el("span", { class: "chip accent", text: m.nature }));
    box.appendChild(el("span", { class: "chip", text: m.registre }));
    if (m.domaine) box.appendChild(el("span", { class: "chip gold", text: m.domaine }));
    return box;
  }

  function block(label, node) {
    return el("div", { class: "mdj-block" }, [el("div", { class: "lbl", text: label }), node]);
  }

  function synChips(list, cls) {
    const box = el("div", { class: "syn-list" });
    list.forEach((s) => box.appendChild(el("span", { class: cls, text: s })));
    return box;
  }

  function wordCard(m, dateLabel) {
    const card = el("div", { class: "mdj-card" });
    if (dateLabel) card.appendChild(el("div", { class: "mdj-date", text: dateLabel }));
    card.appendChild(el("div", { class: "mdj-word", text: m.mot }));
    card.appendChild(chips(m));
    card.appendChild(el("div", { class: "mdj-def", text: m.definition }));

    if (m.etymologie) card.appendChild(el("div", { class: "mdj-block muted", style: { fontStyle: "italic", fontSize: "15px" }, text: "Étymologie : " + m.etymologie }));

    if (m.exemples && m.exemples.length) {
      const ex = el("div", null, m.exemples.map((e) => el("div", { class: "mdj-ex", text: "« " + e + " »" })));
      card.appendChild(block("Exemples", ex));
    }
    if (m.synonymes && m.synonymes.length) card.appendChild(block("Synonymes", synChips(m.synonymes, "chip")));
    if (m.antonymes && m.antonymes.length) card.appendChild(block("Antonymes", synChips(m.antonymes, "chip gold")));

    // Actions
    const favBtn = el("button", { class: "btn", "aria-label": "Favori" });
    function paintFav() {
      const fav = isFav(m.mot);
      favBtn.innerHTML = (fav ? IC.heartFull : IC.heart) + `<span>${fav ? "Favori" : "Ajouter"}</span>`;
      favBtn.classList.toggle("primary", fav);
    }
    paintFav();
    favBtn.addEventListener("click", () => { toggleFav(m.mot); paintFav(); });

    const speakBtn = el("button", { class: "btn", html: IC.speak + "<span>Prononcer</span>", on: { click: () => tts && tts.speak(m.mot, { rate: 0.95 }) } });

    card.appendChild(el("div", { class: "mdj-actions" }, [speakBtn, favBtn]));
    return card;
  }

  /* ---------- Écran d'un mot (historique / favori / hasard) ---------- */
  function backBtn() {
    return el("button", { class: "back", on: { click: () => LMJ.nav.back() } }, [el("span", { html: IC.back }), document.createTextNode("Retour")]);
  }
  function openWord(m, header) {
    LMJ.nav.push((root) => { root.appendChild(backBtn()); root.appendChild(el("div", { class: "spacer" })); root.appendChild(wordCard(m)); }, header);
  }

  /* ---------- Vue racine ---------- */
  function render(root) {
    const m = wordFor();
    if (!m) { root.appendChild(el("div", { class: "empty", text: "Aucun mot disponible." })); return; }

    root.appendChild(wordCard(m, util.frDate()));

    // Explorer au hasard
    root.appendChild(el("div", { class: "spacer" }));
    root.appendChild(el("button", {
      class: "btn block", html: IC.dice + "<span>Piocher un mot au hasard</span>",
      on: { click: () => {
        const list = mots();
        const rnd = list[Math.floor(Math.random() * list.length)];
        openWord(rnd, { eyebrow: "Exploration", title: "Au hasard", sub: "Un mot pioché dans le corpus" });
      } },
    }));

    // Favoris
    const favs = getFavs();
    if (favs.length) {
      root.appendChild(el("div", { class: "section-head" }, [el("h2", { text: "Mes favoris" })]));
      const list = el("div");
      favs.slice().reverse().forEach((nom) => {
        const mm = findMot(nom);
        if (!mm) return;
        list.appendChild(el("div", { class: "hist-item", on: { click: () => openWord(mm, { eyebrow: "Favori", title: mm.mot, sub: mm.nature }) } }, [
          el("span", { class: "w", text: mm.mot }),
          el("span", { class: "muted", style: { fontSize: "13px" }, text: mm.registre }),
        ]));
      });
      root.appendChild(list);
    }

    // Historique des jours précédents
    root.appendChild(el("div", { class: "section-head" }, [el("h2", { text: "Les jours précédents" })]));
    const hist = el("div");
    for (let i = 1; i <= 14; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const mm = wordFor(d);
      if (!mm) continue;
      hist.appendChild(el("div", { class: "hist-item", on: { click: () => openWord(mm, { eyebrow: "Historique", title: mm.mot, sub: util.frDate(d) }) } }, [
        el("span", { class: "w", text: mm.mot }),
        el("span", { class: "dt", text: d.toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) }),
      ]));
    }
    root.appendChild(hist);
  }

  LMJ.views.motdujour = { render };
})();


/* ===== js/view-dictee.js ===== */
/* =====================================================================
   Le Mot Juste — Vue « Dictée »
   Choix du niveau → texte, lecture vocale phrase par phrase,
   saisie, puis correction (diff mot-à-mot) et score.
   ===================================================================== */
(function () {
  "use strict";
  const G = typeof window !== "undefined" ? window : globalThis;
  const LMJ = (G.LMJ = G.LMJ || {});
  const { util, store, tts } = LMJ;
  const el = util && util.el ? util.el.bind(util) : null;

  /* =====================================================================
     Moteur de correction (diff mot-à-mot)
     ===================================================================== */
  function tokenize(text) {
    const re = /[\p{L}\p{N}]+(?:['’\-][\p{L}\p{N}]+)*/gu;
    return (text.match(re) || []).map((w) => w.replace(/[’]/g, "'"));
  }

  // Distance d'édition mot-à-mot (Levenshtein) avec substitution de premier rang :
  // chaque mot faux, oublié ou en trop compte pour exactement une faute.
  function editDiff(a, b) {
    const n = a.length, m = b.length;
    const D = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
    for (let i = 0; i <= n; i++) D[i][0] = i;
    for (let j = 0; j <= m; j++) D[0][j] = j;
    for (let i = 1; i <= n; i++)
      for (let j = 1; j <= m; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        D[i][j] = Math.min(D[i - 1][j - 1] + cost, D[i - 1][j] + 1, D[i][j - 1] + 1);
      }

    const ops = [];
    let i = n, j = m;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && a[i - 1] === b[j - 1] && D[i][j] === D[i - 1][j - 1]) { ops.push({ t: "ok", a: a[i - 1] }); i--; j--; }
      else if (i > 0 && j > 0 && D[i][j] === D[i - 1][j - 1] + 1) { ops.push({ t: "sub", a: a[i - 1], b: b[j - 1] }); i--; j--; }
      else if (i > 0 && D[i][j] === D[i - 1][j] + 1) { ops.push({ t: "del", a: a[i - 1] }); i--; }
      else { ops.push({ t: "ins", b: b[j - 1] }); j--; }
    }
    ops.reverse();
    return ops;
  }

  function correct(original, user) {
    const a = tokenize(original), b = tokenize(user);
    const ops = editDiff(a, b);
    let fautes = 0;
    ops.forEach((o) => { if (o.t !== "ok") fautes++; });
    const total = a.length || 1;
    const pourcent = Math.max(0, Math.round((1 - fautes / total) * 100));
    const note = Math.max(0, Math.round((1 - fautes / total) * 20 * 10) / 10);
    return { ops, fautes, total, pourcent, note };
  }
  LMJ.diffDictee = correct; // exposé pour les tests

  if (!el) { // contexte Node (tests) : on s'arrête après l'export du moteur
    if (typeof module !== "undefined" && module.exports) module.exports = { correct, tokenize };
    return;
  }

  /* =====================================================================
     Icônes
     ===================================================================== */
  const IC = {
    play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
    pause: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>',
    prev: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19 4 12l7-7M20 19l-7-7 7-7"/></svg>',
    next: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 19 7-7-7-7M4 19l7-7-7-7"/></svg>',
    replay: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>',
    back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  };

  const splitSentences = (t) => (t.match(/[^.!?…]+[.!?…]*/g) || [t]).map((s) => s.trim()).filter(Boolean);

  const bestScores = () => store.get("dicteeScores", {});
  function saveScore(id, res) {
    const s = bestScores();
    if (!s[id] || res.fautes < s[id].fautes) { s[id] = { fautes: res.fautes, total: res.total, date: util.todayKey() }; store.set("dicteeScores", s); }
  }

  function backBtn() {
    return el("button", { class: "back", on: { click: () => LMJ.nav.back() } }, [el("span", { html: IC.back }), document.createTextNode("Retour")]);
  }

  /* =====================================================================
     Écran d'une dictée
     ===================================================================== */
  function openDictee(d) {
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      root.appendChild(el("div", { class: "spacer" }));

      root.appendChild(el("div", { class: "section-head", style: { marginTop: "0" } }, [el("h2", { text: d.titre })]));
      if (d.source) root.appendChild(el("div", { class: "muted", style: { marginTop: "-8px", marginBottom: "8px", fontStyle: "italic" }, text: "— " + d.source }));

      if (!tts || !tts.supported) {
        root.appendChild(el("div", { class: "note", style: { marginBottom: "14px" }, text: "La synthèse vocale n'est pas disponible sur cet appareil. Le texte est affiché ci-dessous pour t'entraîner." }));
        root.appendChild(el("div", { class: "card", style: { marginBottom: "14px" }, text: d.texte }));
      }

      const sentences = splitSentences(d.texte);
      let current = 0;
      let rate = store.get("dicteeRate", 0.9);

      /* ----- Lecteur ----- */
      const counter = el("div", { class: "muted", style: { fontSize: "13px" }, text: `Phrase 1 / ${sentences.length}` });
      const playBtn = el("button", { class: "play-btn", html: IC.play, "aria-label": "Écouter" });
      const prevBtn = el("button", { class: "btn", html: IC.prev, "aria-label": "Phrase précédente" });
      const nextBtn = el("button", { class: "btn", html: IC.next, "aria-label": "Phrase suivante" });

      let playing = false;
      function updateCounter() { counter.textContent = `Phrase ${current + 1} / ${sentences.length}`; }
      function playCurrent() {
        if (!tts || !tts.supported) return;
        playing = true; playBtn.innerHTML = IC.pause;
        tts.speak(sentences[current], {
          rate,
          onend: () => { playing = false; playBtn.innerHTML = IC.play; },
        });
      }
      playBtn.addEventListener("click", () => {
        if (playing) { tts.cancel(); playing = false; playBtn.innerHTML = IC.play; }
        else playCurrent();
      });
      prevBtn.addEventListener("click", () => { if (current > 0) current--; updateCounter(); playCurrent(); });
      nextBtn.addEventListener("click", () => { if (current < sentences.length - 1) current++; updateCounter(); playCurrent(); });

      const speed = el("input", { type: "range", min: "0.5", max: "1.2", step: "0.05", value: String(rate) });
      speed.addEventListener("input", () => { rate = parseFloat(speed.value); store.set("dicteeRate", rate); });

      const player = el("div", { class: "player" }, [
        prevBtn, playBtn, nextBtn,
        el("div", { class: "speed-ctl" }, [el("span", { text: "Vitesse" }), speed]),
      ]);
      root.append(counter, el("div", { class: "spacer", style: { height: "6px" } }), player);

      root.appendChild(el("button", { class: "btn ghost block", html: IC.replay + "<span>Réécouter tout le texte</span>", on: { click: () => tts && tts.speak(d.texte, { rate }) } }));

      /* ----- Saisie ----- */
      root.appendChild(el("div", { class: "lbl", style: { fontSize: "12px", letterSpacing: ".1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: "700", margin: "20px 0 8px" }, text: "Écris ce que tu entends" }));
      const textarea = el("textarea", { class: "dictee-input", placeholder: "Tape ton texte ici…", autocapitalize: "sentences", spellcheck: "false" });
      root.appendChild(textarea);

      const resultBox = el("div");
      const correctBtn = el("button", { class: "btn primary block", text: "Corriger ma dictée", style: { marginTop: "14px" } });
      root.append(correctBtn, resultBox);

      correctBtn.addEventListener("click", () => {
        if (tts) tts.cancel();
        const res = correct(d.texte, textarea.value);
        saveScore(d.id, res);
        renderResult(resultBox, res, d);
        if (resultBox.scrollIntoView) resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }, { eyebrow: "Dictée", title: d.titre, sub: "Écoute et recopie" });
  }

  function renderResult(box, res, d) {
    util.clear(box);

    const color = res.fautes === 0 ? "var(--green)" : res.fautes <= 3 ? "var(--amber)" : "var(--red)";
    const card = el("div", { class: "card", style: { marginTop: "16px" } });

    // Score
    card.appendChild(el("div", { class: "score-ring" }, [
      el("div", { class: "score-num", style: { color }, html: `${res.fautes}<small> faute${res.fautes > 1 ? "s" : ""}</small>` }),
      el("div", null, [
        el("div", { style: { fontSize: "20px", fontWeight: "700" }, text: res.note + " / 20" }),
        el("div", { class: "muted", style: { fontSize: "13.5px" }, text: `${res.pourcent} % de réussite · ${res.total} mots` }),
      ]),
    ]));

    const msg = res.fautes === 0 ? "Sans faute, magnifique !" : res.fautes <= 3 ? "Très bien, presque parfait." : res.fautes <= 8 ? "Bon travail, continue de t'exercer." : "Courage, relis les règles et recommence !";
    card.appendChild(el("div", { class: "note astuce", style: { marginTop: "14px" }, text: msg }));

    // Diff
    card.appendChild(el("div", { class: "lbl", style: { fontSize: "12px", letterSpacing: ".1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: "700", margin: "18px 0 8px" }, text: "Correction" }));
    const diff = el("div", { class: "diff" });
    res.ops.forEach((o) => {
      if (o.t === "ok") diff.append(document.createTextNode(o.a + " "));
      else if (o.t === "sub") { diff.appendChild(el("span", { class: "bad", text: o.b })); diff.append(" "); diff.appendChild(el("span", { class: "miss", text: o.a })); diff.append(" "); }
      else if (o.t === "del") { diff.appendChild(el("span", { class: "miss", text: o.a })); diff.append(" "); }
      else if (o.t === "ins") { diff.appendChild(el("span", { class: "ins", text: o.b })); diff.append(" "); }
    });
    card.appendChild(diff);

    card.appendChild(el("div", { class: "legend" }, [
      el("span", null, [el("i", { style: { background: "var(--red-soft)" } }), document.createTextNode("ce que tu as écrit (faux)")]),
      el("span", null, [el("i", { style: { background: "var(--green-soft)" } }), document.createTextNode("le mot correct / oublié")]),
      el("span", null, [el("i", { style: { background: "var(--amber-soft)" } }), document.createTextNode("mot en trop")]),
    ]));

    // Texte original
    const det = el("details", { class: "rule", style: { marginTop: "14px" } });
    det.append(
      el("summary", null, [el("span", { class: "marker", html: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>' }), document.createTextNode("Voir le texte original")]),
      el("div", { class: "body" }, [el("p", { style: { fontFamily: "var(--serif)", fontSize: "16.5px", lineHeight: "1.7" }, text: d.texte })])
    );
    card.appendChild(det);

    box.appendChild(card);
    box.appendChild(el("button", { class: "btn block", text: "Recommencer cette dictée", style: { marginTop: "12px" }, on: { click: () => { LMJ.nav.back(); setTimeout(() => openDictee(d), 30); } } }));
  }

  /* =====================================================================
     Écran d'un niveau (liste des dictées)
     ===================================================================== */
  function openNiveau(niv) {
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      root.appendChild(el("div", { class: "spacer" }));
      const scores = bestScores();
      const list = el("div", { class: "level-list level-" + niv.id });
      LMJ.data.dictees.filter((d) => d.niveau === niv.id).forEach((d) => {
        const best = scores[d.id];
        list.appendChild(el("button", { class: "level-card", on: { click: () => openDictee(d) } }, [
          el("span", { class: "level-dot" }),
          el("div", { style: { flex: "1" } }, [
            el("h3", { text: d.titre }),
            el("div", { class: "meta", text: d.source ? "— " + d.source : (d.texte.split(/\s+/).length + " mots") }),
          ]),
          best ? el("span", { class: "chip", text: "record : " + best.fautes + " f." }) : null,
        ]));
      });
      root.appendChild(list);
    }, { eyebrow: "Dictée", title: niv.nom, sub: niv.desc });
  }

  /* =====================================================================
     Écran racine : les 3 niveaux
     ===================================================================== */
  function render(root) {
    if (!tts || !tts.supported) {
      root.appendChild(el("div", { class: "note", style: { marginBottom: "16px" }, text: "Astuce : sur ton téléphone, la voix française du système lira les dictées. Assure-toi qu'une voix française est installée dans les réglages de synthèse vocale." }));
    }
    root.appendChild(el("p", { class: "muted", text: "Choisis un niveau. Écoute le texte lu à voix haute, recopie-le, puis lance la correction." }));
    const list = el("div", { class: "level-list", style: { marginTop: "12px" } });
    LMJ.data.dicteeNiveaux.forEach((niv) => {
      const count = LMJ.data.dictees.filter((d) => d.niveau === niv.id).length;
      list.appendChild(el("button", { class: "level-card level-" + niv.id, on: { click: () => openNiveau(niv) } }, [
        el("span", { class: "level-dot" }),
        el("div", { style: { flex: "1" } }, [
          el("h3", { text: niv.nom }),
          el("div", { class: "meta", text: niv.desc }),
        ]),
        el("span", { class: "level-badge", text: count + " dictées" }),
      ]));
    });
    root.appendChild(list);
  }

  LMJ.views.dictee = { render };
})();


/* ===== js/app.js ===== */
/* =====================================================================
   Le Mot Juste — Amorçage
   Barre d'onglets, pile de navigation (compatible bouton retour Android),
   en-tête contextuel, enregistrement du service worker.
   ===================================================================== */
(function () {
  "use strict";
  const { util, store } = window.LMJ;
  const view = util.$("#view");
  const headerEl = util.$("#app-header");
  const tabbarEl = util.$("#tabbar");

  /* ---------- Icônes (inline SVG, aucune ressource externe) ---------- */
  const ICONS = {
    regles:
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16a2 2 0 0 0-2-2H2z"/><path d="M22 4a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2v16a2 2 0 0 1 2-2h6z"/></svg>',
    motdujour:
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.1 5.6L20 10l-5.9 1.4L12 17l-2.1-5.6L4 10l5.9-1.4z"/></svg>',
    dictee:
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-5a9 9 0 0 1 18 0v5"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>',
  };

  const TABS = [
    { id: "regles", label: "Les règles", eyebrow: "Référentiel", title: "Les règles", sub: "Accords, conjugaison, confusions, usages, vocabulaire" },
    { id: "motdujour", label: "Mot du jour", eyebrow: "Un mot par jour", title: "Le mot du jour", sub: "Enrichir son éloquence, jour après jour" },
    { id: "dictee", label: "Dictée", eyebrow: "S'exercer", title: "Dictées", sub: "Du niveau facile à expert" },
  ];

  /* ---------- État & pile de navigation ---------- */
  let currentTab = null;
  let stack = []; // pile de fonctions render(root) ; index 0 = racine de l'onglet

  function drawTop() {
    const fn = stack[stack.length - 1];
    util.clear(view);
    window.scrollTo({ top: 0 });
    fn(view);
  }

  function setHeader({ eyebrow, title, sub }) {
    util.clear(headerEl);
    util.append(headerEl, [
      eyebrow ? util.el("div", { class: "eyebrow", text: eyebrow }) : null,
      util.el("h1", { text: title || "" }),
      sub ? util.el("div", { class: "sub", text: sub }) : null,
    ]);
  }

  function renderTabbar() {
    util.clear(tabbarEl);
    TABS.forEach((t) => {
      const btn = util.el("button", {
        class: t.id === currentTab ? "active" : "",
        role: "tab",
        html: ICONS[t.id] + `<span>${t.label}</span>`,
        on: { click: () => selectTab(t.id) },
      });
      tabbarEl.appendChild(btn);
    });
  }

  function selectTab(tabId, opts) {
    opts = opts || {};
    const tab = TABS.find((t) => t.id === tabId) || TABS[0];
    currentTab = tab.id;
    setHeader(tab); // en-tête par défaut ; la vue peut le remplacer
    const viewMod = window.LMJ.views[tab.id];
    stack = [
      (root) => {
        setHeader(tab);
        if (viewMod && viewMod.render) viewMod.render(root);
        else root.appendChild(util.el("div", { class: "empty", text: "Bientôt disponible." }));
      },
    ];
    renderTabbar();
    drawTop();
    store.set("tab", tab.id);
    if (!opts.fromPop) history.replaceState({ tab: tab.id, depth: 0 }, "");
  }

  /* API de navigation pour les vues (drill-down) */
  window.LMJ.nav = {
    /** Empile un nouvel écran. header : {eyebrow,title,sub} optionnel. */
    push(renderFn, header) {
      stack.push((root) => {
        if (header) setHeader(header);
        renderFn(root);
      });
      history.pushState({ tab: currentTab, depth: stack.length - 1 }, "");
      drawTop();
    },
    back() {
      if (stack.length > 1) history.back();
    },
    setHeader,
  };

  window.addEventListener("popstate", (e) => {
    if (stack.length > 1) {
      stack.pop();
      drawTop();
    } else {
      const st = e.state;
      if (st && st.tab && st.tab !== currentTab) selectTab(st.tab, { fromPop: true });
    }
  });

  /* ---------- Enregistrement du service worker ---------- */
  function registerSW() {
    if (!("serviceWorker" in navigator)) return;
    // Uniquement en contexte sécurisé (https ou localhost) — pas en file://
    if (location.protocol === "file:") return;

    // Recharge une fois lorsqu'une nouvelle version prend le contrôle.
    let refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshing) return;
      refreshing = true;
      location.reload();
    });

    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("service-worker.js", { updateViaCache: "none" })
        .then((reg) => {
          reg.update();
          // Vérifie les mises à jour à chaque retour sur l'app et périodiquement.
          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") reg.update();
          });
          setInterval(() => reg.update(), 60 * 60 * 1000);
        })
        .catch((e) => console.warn("[SW] non enregistré :", e));
    });
  }

  /* ---------- Démarrage ---------- */
  function start() {
    if (LMJ.tts) LMJ.tts.init();
    const last = store.get("tab", "regles");
    selectTab(TABS.find((t) => t.id === last) ? last : "regles");
    registerSW();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start);
  } else {
    start();
  }
})();

</script>
</body>
</html>
