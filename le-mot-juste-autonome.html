    heartFull: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.5 1.1-1a5.5 5.5 0 0 0 0-7.9z"/></svg>',
    dice: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="15.5" r="1.3" fill="currentColor"/><circle cx="15.5" cy="8.5" r="1.3" fill="currentColor"/><circle cx="8.5" cy="15.5" r="1.3" fill="currentColor"/></svg>',
    back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  };

  const mots = () => LMJ.data.mots || [];
  const wordFor = (date) => { const m = mots(); return m.length ? m[((util.dayNumber(date) % m.length) + m.length) % m.length] : null; };

  const getFavs = () => store.get("favoris", []);
  const isFav = (mot) => getFavs().indexOf(mot) !== -1;
  function toggleFav(mot) {
    const f = getFavs();
    const i = f.indexOf(mot);
    if (i === -1) f.push(mot); else f.splice(i, 1);
    store.set("favoris", f);
    return i === -1;
  }
  const findMot = (nom) => mots().find((m) => m.mot === nom);

  /* ---------- Carte d'un mot ---------- */
  function chips(m) {
    const box = el("div", { class: "mdj-meta" });
    box.appendChild(el("span", { class: "chip accent", text: m.nature }));
    box.appendChild(el("span", { class: "chip", text: m.registre }));
    if (m.domaine) box.appendChild(el("span", { class: "chip gold", text: m.domaine }));
    return box;
  }

  function block(label, node) {
    return el("div", { class: "mdj-block" }, [el("div", { class: "lbl", text: label }), node]);
  }

  function synChips(list, cls) {
    const box = el("div", { class: "syn-list" });
    list.forEach((s) => box.appendChild(el("span", { class: cls, text: s })));
    return box;
  }

  function wordCard(m, dateLabel) {
    const card = el("div", { class: "mdj-card" });
    if (dateLabel) card.appendChild(el("div", { class: "mdj-date", text: dateLabel }));
    card.appendChild(el("div", { class: "mdj-word", text: m.mot }));
    card.appendChild(chips(m));
    card.appendChild(el("div", { class: "mdj-def", text: m.definition }));

    if (m.etymologie) card.appendChild(el("div", { class: "mdj-block muted", style: { fontStyle: "italic", fontSize: "15px" }, text: "Ătymologie : " + m.etymologie }));

    if (m.exemples && m.exemples.length) {
      const ex = el("div", null, m.exemples.map((e) => el("div", { class: "mdj-ex", text: "ÂŤ " + e + " Âť" })));
      card.appendChild(block("Exemples", ex));
    }
    if (m.synonymes && m.synonymes.length) card.appendChild(block("Synonymes", synChips(m.synonymes, "chip")));
    if (m.antonymes && m.antonymes.length) card.appendChild(block("Antonymes", synChips(m.antonymes, "chip gold")));

    // Actions
    const favBtn = el("button", { class: "btn", "aria-label": "Favori" });
    function paintFav() {
      const fav = isFav(m.mot);
      favBtn.innerHTML = (fav ? IC.heartFull : IC.heart) + `<span>${fav ? "Favori" : "Ajouter"}</span>`;
      favBtn.classList.toggle("primary", fav);
    }
    paintFav();
    favBtn.addEventListener("click", () => { toggleFav(m.mot); paintFav(); });

    const speakBtn = el("button", { class: "btn", html: IC.speak + "<span>Prononcer</span>", on: { click: () => tts && tts.speak(m.mot, { rate: 0.95 }) } });

    card.appendChild(el("div", { class: "mdj-actions" }, [speakBtn, favBtn]));
    return card;
  }

  /* ---------- Ăcran d'un mot (historique / favori / hasard) ---------- */
  function backBtn() {
    return el("button", { class: "back", on: { click: () => LMJ.nav.back() } }, [el("span", { html: IC.back }), document.createTextNode("Retour")]);
  }
  function openWord(m, header) {
    LMJ.nav.push((root) => { root.appendChild(backBtn()); root.appendChild(el("div", { class: "spacer" })); root.appendChild(wordCard(m)); }, header);
  }

  /* ---------- Vue racine ---------- */
  function render(root) {
    const m = wordFor();
    if (!m) { root.appendChild(el("div", { class: "empty", text: "Aucun mot disponible." })); return; }

    root.appendChild(wordCard(m, util.frDate()));

    // Explorer au hasard
    root.appendChild(el("div", { class: "spacer" }));
    root.appendChild(el("button", {
      class: "btn block", html: IC.dice + "<span>Piocher un mot au hasard</span>",
      on: { click: () => {
        const list = mots();
        const rnd = list[Math.floor(Math.random() * list.length)];
        openWord(rnd, { eyebrow: "Exploration", title: "Au hasard", sub: "Un mot piochĂŠ dans le corpus" });
      } },
    }));

    // Favoris
    const favs = getFavs();
    if (favs.length) {
      root.appendChild(el("div", { class: "section-head" }, [el("h2", { text: "Mes favoris" })]));
      const list = el("div");
      favs.slice().reverse().forEach((nom) => {
        const mm = findMot(nom);
        if (!mm) return;
        list.appendChild(el("div", { class: "hist-item", on: { click: () => openWord(mm, { eyebrow: "Favori", title: mm.mot, sub: mm.nature }) } }, [
          el("span", { class: "w", text: mm.mot }),
          el("span", { class: "muted", style: { fontSize: "13px" }, text: mm.registre }),
        ]));
      });
      root.appendChild(list);
    }

    // Historique des jours prĂŠcĂŠdents
    root.appendChild(el("div", { class: "section-head" }, [el("h2", { text: "Les jours prĂŠcĂŠdents" })]));
    const hist = el("div");
    for (let i = 1; i <= 14; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const mm = wordFor(d);
      if (!mm) continue;
      hist.appendChild(el("div", { class: "hist-item", on: { click: () => openWord(mm, { eyebrow: "Historique", title: mm.mot, sub: util.frDate(d) }) } }, [
        el("span", { class: "w", text: mm.mot }),
        el("span", { class: "dt", text: d.toLocaleDateString("fr-FR", { day: "numeric", month: "short" }) }),
      ]));
    }
    root.appendChild(hist);
  }

  LMJ.views.motdujour = { render };
})();


/* ===== js/view-dictee.js ===== */
/* =====================================================================
   Le Mot Juste â Vue ÂŤ DictĂŠe Âť
   Choix du niveau â texte, lecture vocale phrase par phrase,
   saisie, puis correction (diff mot-Ă -mot) et score.
   ===================================================================== */
(function () {
  "use strict";
  const G = typeof window !== "undefined" ? window : globalThis;
  const LMJ = (G.LMJ = G.LMJ || {});
  const { util, store, tts } = LMJ;
  const el = util && util.el ? util.el.bind(util) : null;

  /* =====================================================================
     Moteur de correction (diff mot-Ă -mot)
     ===================================================================== */
  function tokenize(text) {
    const re = /[\p{L}\p{N}]+(?:['â\-][\p{L}\p{N}]+)*/gu;
    return (text.match(re) || []).map((w) => w.replace(/[â]/g, "'"));
  }

  // Distance d'ĂŠdition mot-Ă -mot (Levenshtein) avec substitution de premier rang :
  // chaque mot faux, oubliĂŠ ou en trop compte pour exactement une faute.
  function editDiff(a, b) {
    const n = a.length, m = b.length;
    const D = Array.from({ length: n + 1 }, () => new Int32Array(m + 1));
    for (let i = 0; i <= n; i++) D[i][0] = i;
    for (let j = 0; j <= m; j++) D[0][j] = j;
    for (let i = 1; i <= n; i++)
      for (let j = 1; j <= m; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        D[i][j] = Math.min(D[i - 1][j - 1] + cost, D[i - 1][j] + 1, D[i][j - 1] + 1);
      }

    const ops = [];
    let i = n, j = m;
    while (i > 0 || j > 0) {
      if (i > 0 && j > 0 && a[i - 1] === b[j - 1] && D[i][j] === D[i - 1][j - 1]) { ops.push({ t: "ok", a: a[i - 1] }); i--; j--; }
      else if (i > 0 && j > 0 && D[i][j] === D[i - 1][j - 1] + 1) { ops.push({ t: "sub", a: a[i - 1], b: b[j - 1] }); i--; j--; }
      else if (i > 0 && D[i][j] === D[i - 1][j] + 1) { ops.push({ t: "del", a: a[i - 1] }); i--; }
      else { ops.push({ t: "ins", b: b[j - 1] }); j--; }
    }
    ops.reverse();
    return ops;
  }

  function correct(original, user) {
    const a = tokenize(original), b = tokenize(user);
    const ops = editDiff(a, b);
    let fautes = 0;
    ops.forEach((o) => { if (o.t !== "ok") fautes++; });
    const total = a.length || 1;
    const pourcent = Math.max(0, Math.round((1 - fautes / total) * 100));
    const note = Math.max(0, Math.round((1 - fautes / total) * 20 * 10) / 10);
    return { ops, fautes, total, pourcent, note };
  }
  LMJ.diffDictee = correct; // exposĂŠ pour les tests

  if (!el) { // contexte Node (tests) : on s'arrĂŞte aprĂ¨s l'export du moteur
    if (typeof module !== "undefined" && module.exports) module.exports = { correct, tokenize };
    return;
  }

  /* =====================================================================
     IcĂ´nes
     ===================================================================== */
  const IC = {
    play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>',
    pause: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>',
    prev: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19 4 12l7-7M20 19l-7-7 7-7"/></svg>',
    next: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 19 7-7-7-7M4 19l7-7-7-7"/></svg>',
    replay: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>',
    back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
  };

  const splitSentences = (t) => (t.match(/[^.!?âŚ]+[.!?âŚ]*/g) || [t]).map((s) => s.trim()).filter(Boolean);

  const bestScores = () => store.get("dicteeScores", {});
  function saveScore(id, res) {
    const s = bestScores();
    if (!s[id] || res.fautes < s[id].fautes) { s[id] = { fautes: res.fautes, total: res.total, date: util.todayKey() }; store.set("dicteeScores", s); }
  }

  function backBtn() {
    return el("button", { class: "back", on: { click: () => LMJ.nav.back() } }, [el("span", { html: IC.back }), document.createTextNode("Retour")]);
  }

  /* =====================================================================
     Ăcran d'une dictĂŠe
     ===================================================================== */
  function openDictee(d) {
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      root.appendChild(el("div", { class: "spacer" }));

      root.appendChild(el("div", { class: "section-head", style: { marginTop: "0" } }, [el("h2", { text: d.titre })]));
      if (d.source) root.appendChild(el("div", { class: "muted", style: { marginTop: "-8px", marginBottom: "8px", fontStyle: "italic" }, text: "â " + d.source }));

      if (!tts || !tts.supported) {
        root.appendChild(el("div", { class: "note", style: { marginBottom: "14px" }, text: "La synthĂ¨se vocale n'est pas disponible sur cet appareil. Le texte est affichĂŠ ci-dessous pour t'entraĂŽner." }));
        root.appendChild(el("div", { class: "card", style: { marginBottom: "14px" }, text: d.texte }));
      }

      const sentences = splitSentences(d.texte);
      let current = 0;
      let rate = store.get("dicteeRate", 0.9);

      /* ----- Lecteur ----- */
      const counter = el("div", { class: "muted", style: { fontSize: "13px" }, text: `Phrase 1 / ${sentences.length}` });
      const playBtn = el("button", { class: "play-btn", html: IC.play, "aria-label": "Ăcouter" });
      const prevBtn = el("button", { class: "btn", html: IC.prev, "aria-label": "Phrase prĂŠcĂŠdente" });
      const nextBtn = el("button", { class: "btn", html: IC.next, "aria-label": "Phrase suivante" });

      let playing = false;
      function updateCounter() { counter.textContent = `Phrase ${current + 1} / ${sentences.length}`; }
      function playCurrent() {
        if (!tts || !tts.supported) return;
        playing = true; playBtn.innerHTML = IC.pause;
        tts.speak(sentences[current], {
          rate,
          onend: () => { playing = false; playBtn.innerHTML = IC.play; },
        });
      }
      playBtn.addEventListener("click", () => {
        if (playing) { tts.cancel(); playing = false; playBtn.innerHTML = IC.play; }
        else playCurrent();
      });
      prevBtn.addEventListener("click", () => { if (current > 0) current--; updateCounter(); playCurrent(); });
      nextBtn.addEventListener("click", () => { if (current < sentences.length - 1) current++; updateCounter(); playCurrent(); });

      const speed = el("input", { type: "range", min: "0.5", max: "1.2", step: "0.05", value: String(rate) });
      speed.addEventListener("input", () => { rate = parseFloat(speed.value); store.set("dicteeRate", rate); });

      const player = el("div", { class: "player" }, [
        prevBtn, playBtn, nextBtn,
        el("div", { class: "speed-ctl" }, [el("span", { text: "Vitesse" }), speed]),
      ]);
      root.append(counter, el("div", { class: "spacer", style: { height: "6px" } }), player);

      root.appendChild(el("button", { class: "btn ghost block", html: IC.replay + "<span>RĂŠĂŠcouter tout le texte</span>", on: { click: () => tts && tts.speak(d.texte, { rate }) } }));

      /* ----- Saisie ----- */
      root.appendChild(el("div", { class: "lbl", style: { fontSize: "12px", letterSpacing: ".1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: "700", margin: "20px 0 8px" }, text: "Ăcris ce que tu entends" }));
      const textarea = el("textarea", { class: "dictee-input", placeholder: "Tape ton texte iciâŚ", autocapitalize: "sentences", spellcheck: "false" });
      root.appendChild(textarea);

      const resultBox = el("div");
      const correctBtn = el("button", { class: "btn primary block", text: "Corriger ma dictĂŠe", style: { marginTop: "14px" } });
      root.append(correctBtn, resultBox);

      correctBtn.addEventListener("click", () => {
        if (tts) tts.cancel();
        const res = correct(d.texte, textarea.value);
        saveScore(d.id, res);
        renderResult(resultBox, res, d);
        if (resultBox.scrollIntoView) resultBox.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }, { eyebrow: "DictĂŠe", title: d.titre, sub: "Ăcoute et recopie" });
  }

  function renderResult(box, res, d) {
    util.clear(box);

    const color = res.fautes === 0 ? "var(--green)" : res.fautes <= 3 ? "var(--amber)" : "var(--red)";
    const card = el("div", { class: "card", style: { marginTop: "16px" } });

    // Score
    card.appendChild(el("div", { class: "score-ring" }, [
      el("div", { class: "score-num", style: { color }, html: `${res.fautes}<small> faute${res.fautes > 1 ? "s" : ""}</small>` }),
      el("div", null, [
        el("div", { style: { fontSize: "20px", fontWeight: "700" }, text: res.note + " / 20" }),
        el("div", { class: "muted", style: { fontSize: "13.5px" }, text: `${res.pourcent} % de rĂŠussite Âˇ ${res.total} mots` }),
      ]),
    ]));

    const msg = res.fautes === 0 ? "Sans faute, magnifique !" : res.fautes <= 3 ? "TrĂ¨s bien, presque parfait." : res.fautes <= 8 ? "Bon travail, continue de t'exercer." : "Courage, relis les rĂ¨gles et recommence !";
    card.appendChild(el("div", { class: "note astuce", style: { marginTop: "14px" }, text: msg }));

    // Diff
    card.appendChild(el("div", { class: "lbl", style: { fontSize: "12px", letterSpacing: ".1em", textTransform: "uppercase", color: "var(--accent)", fontWeight: "700", margin: "18px 0 8px" }, text: "Correction" }));
    const diff = el("div", { class: "diff" });
    res.ops.forEach((o) => {
      if (o.t === "ok") diff.append(document.createTextNode(o.a + " "));
      else if (o.t === "sub") { diff.appendChild(el("span", { class: "bad", text: o.b })); diff.append(" "); diff.appendChild(el("span", { class: "miss", text: o.a })); diff.append(" "); }
      else if (o.t === "del") { diff.appendChild(el("span", { class: "miss", text: o.a })); diff.append(" "); }
      else if (o.t === "ins") { diff.appendChild(el("span", { class: "ins", text: o.b })); diff.append(" "); }
    });
    card.appendChild(diff);

    card.appendChild(el("div", { class: "legend" }, [
      el("span", null, [el("i", { style: { background: "var(--red-soft)" } }), document.createTextNode("ce que tu as ĂŠcrit (faux)")]),
      el("span", null, [el("i", { style: { background: "var(--green-soft)" } }), document.createTextNode("le mot correct / oubliĂŠ")]),
      el("span", null, [el("i", { style: { background: "var(--amber-soft)" } }), document.createTextNode("mot en trop")]),
    ]));

    // Texte original
    const det = el("details", { class: "rule", style: { marginTop: "14px" } });
    det.append(
      el("summary", null, [el("span", { class: "marker", html: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>' }), document.createTextNode("Voir le texte original")]),
      el("div", { class: "body" }, [el("p", { style: { fontFamily: "var(--serif)", fontSize: "16.5px", lineHeight: "1.7" }, text: d.texte })])
    );
    card.appendChild(det);

    box.appendChild(card);
    box.appendChild(el("button", { class: "btn block", text: "Recommencer cette dictĂŠe", style: { marginTop: "12px" }, on: { click: () => { LMJ.nav.back(); setTimeout(() => openDictee(d), 30); } } }));
  }

  /* =====================================================================
     Ăcran d'un niveau (liste des dictĂŠes)
     ===================================================================== */
  function openNiveau(niv) {
    LMJ.nav.push((root) => {
      root.appendChild(backBtn());
      root.appendChild(el("div", { class: "spacer" }));
      const scores = bestScores();
      const list = el("div", { class: "level-list level-" + niv.id });
      LMJ.data.dictees.filter((d) => d.niveau === niv.id).forEach((d) => {
        const best = scores[d.id];
        list.appendChild(el("button", { class: "level-card", on: { click: () => openDictee(d) } }, [
          el("span", { class: "level-dot" }),
          el("div", { style: { flex: "1" } }, [
            el("h3", { text: d.titre }),
            el("div", { class: "meta", text: d.source ? "â " + d.source : (d.texte.split(/\s+/).length + " mots") }),
          ]),
          best ? el("span", { class: "chip", text: "record : " + best.fautes + " f." }) : null,
        ]));
      });
      root.appendChild(list);
    }, { eyebrow: "DictĂŠe", title: niv.nom, sub: niv.desc });
  }

  /* =====================================================================
     Ăcran racine : les 3 niveaux
     ===================================================================== */
  function render(root) {
    if (!tts || !tts.supported) {
      root.appendChild(el("div", { class: "note", style: { marginBottom: "16px" }, text: "Astuce : sur ton tĂŠlĂŠphone, la voix franĂ§aise du systĂ¨me lira les dictĂŠes. Assure-toi qu'une voix franĂ§aise est installĂŠe dans les rĂŠglages de synthĂ¨se vocale." }));
    }
    root.appendChild(el("p", { class: "muted", text: "Choisis un niveau. Ăcoute le texte lu Ă  voix haute, recopie-le, puis lance la correction." }));
    const list = el("div", { class: "level-list", style: { marginTop: "12px" } });
    LMJ.data.dicteeNiveaux.forEach((niv) => {
      const count = LMJ.data.dictees.filter((d) => d.niveau === niv.id).length;
      list.appendChild(el("button", { class: "level-card level-" + niv.id, on: { click: () => openNiveau(niv) } }, [
        el("span", { class: "level-dot" }),
        el("div", { style: { flex: "1" } }, [
          el("h3", { text: niv.nom }),
          el("div", { class: "meta", text: niv.desc }),
        ]),
        el("span", { class: "level-badge", text: count + " dictĂŠes" }),
      ]));
    });
    root.appendChild(list);
  }

  LMJ.views.dictee = { render };
})();


/* ===== js/app.js ===== */
/* =====================================================================
   Le Mot Juste â AmorĂ§age
   Barre d'onglets, pile de navigation (compatible bouton retour Android),
   en-tĂŞte contextuel, enregistrement du service worker.
   ===================================================================== */
(function () {
  "use strict";
  const { util, store } = window.LMJ;
  const view = util.$("#view");
  const headerEl = util.$("#app-header");
  const tabbarEl = util.$("#tabbar");

  /* ---------- IcĂ´nes (inline SVG, aucune ressource externe) ---------- */
  const ICONS = {
    regles:
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v16a2 2 0 0 0-2-2H2z"/><path d="M22 4a2 2 0 0 0-2-2h-6a2 2 0 0 0-2 2v16a2 2 0 0 1 2-2h6z"/></svg>',
    motdujour:
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.1 5.6L20 10l-5.9 1.4L12 17l-2.1-5.6L4 10l5.9-1.4z"/></svg>',
    dictee:
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-5a9 9 0 0 1 18 0v5"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>',
  };

  const TABS = [
    { id: "regles", label: "Les rĂ¨gles", eyebrow: "RĂŠfĂŠrentiel", title: "Les rĂ¨gles", sub: "Accords, conjugaison, confusions, usages, vocabulaire" },
    { id: "motdujour", label: "Mot du jour", eyebrow: "Un mot par jour", title: "Le mot du jour", sub: "Enrichir son ĂŠloquence, jour aprĂ¨s jour" },
    { id: "dictee", label: "DictĂŠe", eyebrow: "S'exercer", title: "DictĂŠes", sub: "Du niveau facile Ă  expert" },
  ];

  /* ---------- Ătat & pile de navigation ---------- */
  let currentTab = null;
  let stack = []; // pile de fonctions render(root) ; index 0 = racine de l'onglet

  function drawTop() {
    const fn = stack[stack.length - 1];
    util.clear(view);
    window.scrollTo({ top: 0 });
    fn(view);
  }

  function setHeader({ eyebrow, title, sub }) {
    util.clear(headerEl);
    util.append(headerEl, [
      eyebrow ? util.el("div", { class: "eyebrow", text: eyebrow }) : null,
      util.el("h1", { text: title || "" }),
      sub ? util.el("div", { class: "sub", text: sub }) : null,
    ]);
  }

  function renderTabbar() {
    util.clear(tabbarEl);
    TABS.forEach((t) => {
      const btn = util.el("button", {
        class: t.id === currentTab ? "active" : "",
        role: "tab",
        html: ICONS[t.id] + `<span>${t.label}</span>`,
        on: { click: () => selectTab(t.id) },
      });
      tabbarEl.appendChild(btn);
    });
  }

  function selectTab(tabId, opts) {
    opts = opts || {};
    const tab = TABS.find((t) => t.id === tabId) || TABS[0];
    currentTab = tab.id;
    setHeader(tab); // en-tĂŞte par dĂŠfaut ; la vue peut le remplacer
    const viewMod = window.LMJ.views[tab.id];
    stack = [
      (root) => {
        setHeader(tab);
        if (viewMod && viewMod.render) viewMod.render(root);
        else root.appendChild(util.el("div", { class: "empty", text: "BientĂ´t disponible." }));
      },
    ];
    renderTabbar();
    drawTop();
    store.set("tab", tab.id);
    if (!opts.fromPop) history.replaceState({ tab: tab.id, depth: 0 }, "");
  }

  /* API de navigation pour les vues (drill-down) */
  window.LMJ.nav = {
    /** Empile un nouvel ĂŠcran. header : {eyebrow,title,sub} optionnel. */
    push(renderFn, header) {
      stack.push((root) => {
        if (header) setHeader(header);
        renderFn(root);
      });
      history.pushState({ tab: currentTab, depth: stack.length - 1 }, "");
      drawTop();
    },
    back() {
      if (stack.length > 1) history.back();
    },
    setHeader,
  };

  window.addEventListener("popstate", (e) => {
    if (stack.length > 1) {
      stack.pop();
      drawTop();
    } else {
      const st = e.state;
      if (st && st.tab && st.tab !== currentTab) selectTab(st.tab, { fromPop: true });
    }
  });

  /* ---------- Enregistrement du service worker ---------- */
  function registerSW() {
    if (!("serviceWorker" in navigator)) return;
    // Uniquement en contexte sĂŠcurisĂŠ (https ou localhost) â pas en file://
    if (location.protocol === "file:") return;

    // Recharge une fois lorsqu'une nouvelle version prend le contrĂ´le.
    let refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (refreshing) return;
      refreshing = true;
      location.reload();
    });

    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("service-worker.js", { updateViaCache: "none" })
        .then((reg) => {
          reg.update();
          // VĂŠrifie les mises Ă  jour Ă  chaque retour sur l'app et pĂŠriodiquement.
          document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") reg.update();
          });
          setInterval(() => reg.update(), 60 * 60 * 1000);
        })
        .catch((e) => console.warn("[SW] non enregistrĂŠ :", e));
    });
  }

  /* ---------- DĂŠmarrage ---------- */
  function start() {
    if (LMJ.tts) LMJ.tts.init();
    const last = store.get("tab", "regles");
    selectTab(TABS.find((t) => t.id === last) ? last : "regles");
    registerSW();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start);
  } else {
    start();
  }
})();

</script>
</body>
